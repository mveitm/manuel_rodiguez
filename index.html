      <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.Veit - Equilibria Pro V4</title>
    <style>
        :root {
            --bg-warm: #fffdfa;
            --paper: #ffffff;
            --text-dark: #451a03;
            --mrveit: #d97706;
            --accent: #f59e0b;
            --success: #059669;
            --action-blue: #3b82f6;
            --trace: #e2e8f0;
            --danger: #ef4444;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-warm); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-dark); }
        #app { background: var(--paper); width: 95%; max-width: 650px; margin: 20px; border-radius: 24px; box-shadow: 0 15px 35px rgba(69, 26, 3, 0.1); padding: 25px; border: 4px solid var(--mrveit); display: flex; flex-direction: column; }
        
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--mrveit); margin: 0; }
        .teacher-tag { font-size: 0.9rem; color: #92400e; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }

        /* Botones */
        .menu-grid { display: grid; gap: 12px; margin-top: 20px; }
        .btn-main { 
            background: white; border: 2px solid var(--trace); padding: 20px; border-radius: 16px; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: space-between; color: var(--text-dark);
            box-shadow: 0 4px 0 var(--trace);
        }
        .btn-main:hover { border-color: var(--accent); transform: translateY(-2px); }
        .btn-topic { background: var(--mrveit); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; width: 100%; font-size: 1.1rem; }

        /* Contenedores */
        .story-box { background: #fffbeb; border-left: 5px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .history-container { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; padding: 15px; background: #fdfbf7; border-radius: 15px; border: 1px solid #eee; min-height: 80px; }
        
        /* Estilos de Ecuación */
        .step-row { display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1.5rem; padding: 8px; }
        .step-row.current { background: #fffbeb; border-radius: 10px; border: 2px solid var(--accent); }
        .step-row.old { opacity: 0.4; font-size: 1.1rem; border-bottom: 1px dashed var(--trace); }

        /* Fracción Vertical */
        .fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; line-height: 1.1; margin: 0 5px; }
        .num { border-bottom: 2px solid var(--text-dark); padding: 0 8px; width: 100%; text-align: center; }
        .den { padding: 0 8px; width: 100%; text-align: center; }

        /* Interactivos */
        .draggable { background: var(--accent); color: white; padding: 4px 10px; border-radius: 6px; cursor: pointer; box-shadow: 0 3px 0 #b45309; }
        .btn-op { background: var(--danger); color: white; padding: 4px 12px; border-radius: 8px; cursor: pointer; border: none; font-size: 1.1rem; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        .feedback { font-weight: bold; padding: 12px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .correct { background: #d1fae5; color: #065f46; border: 1px solid #059669; }
        .wrong { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }

        /* Reporte */
        .report-card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: left; }
        .sol-detail { background: #f8fafc; padding: 10px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 0.9rem; display: none; white-space: pre-wrap; border-left: 3px solid var(--action-blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="logo-container">
        <div class="teacher-tag">Profesor Mauricio</div>
        <h1 class="logo">Equilibria Pro</h1>
    </div>

    <div id="scr-welcome" class="screen active">
        <h3 style="text-align:center">¡Bienvenido! Prepárate para aprender ecuaciones.</h3>
        <input type="text" id="user-name" placeholder="Tu nombre completo">
        <button class="btn-topic" onclick="goToMenu()">Ingresar</button>
    </div>

    <div id="scr-main-menu" class="screen">
        <h3 style="text-align:center">Selecciona un tema para hoy:</h3>
        <div class="menu-grid">
            <button class="btn-main" onclick="openTopic('ecuaciones')"><span>1. Ecuaciones</span> <span>🧮</span></button>
            <button class="btn-main" onclick="openTopic('valor-absoluto')"><span>2. Valor Absoluto</span> <span>|x|</span></button>
        </div>
    </div>

    <div id="scr-topic-menu" class="screen">
        <button onclick="showScreen('scr-main-menu')" style="border:none; background:none; color:var(--action-blue); cursor:pointer">← Volver al inicio</button>
        <h2 id="topic-title" style="text-align:center"></h2>
        <div class="menu-grid">
            <button class="btn-topic" onclick="startMode('aprende')">1. Aprendamos (Guiado)</button>
            <button class="btn-topic" style="background:var(--action-blue)" onclick="startMode('practica')">2. Practiquemos (Paso a Paso)</button>
            <button class="btn-topic" style="background:var(--success)" onclick="startMode('evalua')">3. Evalúate (Test Final)</button>
        </div>
    </div>

    <div id="scr-aprende" class="screen">
        <div class="story-box" id="aprende-story"></div>
        <div id="tut-box" class="hidden" style="background:#e0f2fe; padding:10px; border-radius:10px; margin-bottom:10px"></div>
        <p id="aprende-instr" style="text-align:center; font-weight:bold; color:var(--mrveit)"></p>
        <div class="history-container" id="aprende-history"></div>
        <button id="btn-next-aprende" class="hidden btn-topic" onclick="nextAprende()">Siguiente Ejercicio →</button>
    </div>

    <div id="scr-practica" class="screen">
        <div class="story-box" id="practica-story"></div>
        <div id="practica-history" class="history-container"></div>
        <div id="practica-input-zone">
            <p id="practica-prompt" style="font-weight:bold; text-align:center"></p>
            <input type="text" id="practica-input" placeholder="Ej: x = 15 - 8">
            <button class="btn-topic" onclick="checkPracticaStep()">Verificar Paso</button>
            <div id="practica-feedback" class="feedback hidden"></div>
        </div>
        <button id="btn-next-practica" class="btn-topic hidden" onclick="nextPractica()">Siguiente Ejercicio →</button>
    </div>

    <div id="scr-evalua" class="screen">
        <h3 style="text-align:center">Evaluación Final</h3>
        <div class="story-box" style="background:#f0f9ff; border-left-color:var(--action-blue)">
            <strong>Instrucciones:</strong> Resuelve en tu cuaderno y anota solo el resultado final (número) de x.
        </div>
        <div id="evalua-container"></div>
        <button class="btn-topic" style="background:var(--success)" onclick="gradeEval()">Finalizar Evaluación</button>
    </div>

    <div id="scr-report" class="screen">
        <h2 style="text-align:center">Reporte de Desempeño</h2>
        <div id="report-score" style="text-align:center; font-size: 3rem; font-weight:bold; margin-bottom:20px"></div>
        <div id="report-details"></div>
        <button class="btn-topic" onclick="sendWA()">Enviar Reporte al Profesor</button>
        <button class="btn-topic btn-secondary" style="background:#64748b" onclick="showScreen('scr-main-menu')">Volver al Inicio</button>
    </div>
</div>

<script>
    let state = { name:"", topic:"", level:0, currentEx:null, step:0, quizPool:[] };

    // --- GENERADOR DE CONTENIDO ---
    function getEx(topic, lvl) {
        if(topic === 'ecuaciones') {
            const data = [
                { s:"Tenías x láminas y te regalaron 8. Ahora tienes 15.", expr:"x + 8 = 15", steps:["x = 15 - 8", "7"], res:7, type:'simple', op:'+', inv:'-', r:8, target:15 },
                { s:"4 cajas iguales contienen x lápices cada una. Hay 20 lápices en total.", expr:"4x = 20", steps:["x = 20 / 4", "5"], res:5, type:'div', l:4, target:20 },
                { s:"El cuádruple de x más 8 es igual a 28.", expr:"4x + 8 = 28", steps:["4x = 28 - 8", "4x = 20", "x = 20 / 4", "5"], res:5, type:'comp_mult', a:4, r:8, target:28 },
                { s:"Repartiste x dulces entre 6 amigos y cada uno recibió 3.", expr:"x / 6 = 3", steps:["x = 3 * 6", "18"], res:18, type:'mult', l:6, target:3 },
                { s:"La sexta parte de x aumentada en 5 es igual a 8.", expr:"x / 6 + 5 = 8", steps:["x / 6 = 8 - 5", "x / 6 = 3", "x = 3 * 6", "18"], res:18, type:'comp_div', l:6, r:5, target:8 }
            ];
            return data[lvl];
        } else {
            const data = [
                { s:"¿Qué números tienen una distancia de 5 unidades respecto al cero?", expr:"|x| = 5", steps:["5", "-5"], res:5, tut:"El valor absoluto es la distancia al 0. Siempre es positivo." },
                { s:"La distancia de x al cero, más 2, es igual a 7.", expr:"|x| + 2 = 7", steps:["|x| = 7 - 2", "5"], res:5 },
                { s:"La distancia entre x y el número 3 es 4.", expr:"|x - 3| = 4", steps:["x - 3 = 4", "7"], res:7 },
                { s:"El doble de la distancia de x al origen es 10.", expr:"2|x| = 10", steps:["|x| = 10 / 2", "5"], res:5 },
                { s:"Dos veces la distancia entre x y 1 es 6.", expr:"2|x - 1| = 6", steps:["|x - 1| = 3", "x - 1 = 3", "4"], res:4 }
            ];
            return data[lvl];
        }
    }

    // --- NAVEGACIÓN ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToMenu() {
        state.name = document.getElementById('user-name').value;
        if(!state.name) return alert("Por favor, ingresa tu nombre.");
        showScreen('scr-main-menu');
    }

    function openTopic(t) {
        state.topic = t;
        document.getElementById('topic-title').innerText = t === 'ecuaciones' ? "Ecuaciones" : "Valor Absoluto";
        showScreen('scr-topic-menu');
    }

    function startMode(m) {
        state.level = 0; state.mode = m;
        if(m === 'aprende') loadAprende();
        else if(m === 'practica') loadPractica();
        else renderEval();
    }

    // --- MODO APRENDE (INTERACTIVO) ---
    function loadAprende() {
        state.currentEx = getEx(state.topic, state.level);
        state.subStep = 0;
        showScreen('scr-aprende');
        document.getElementById('aprende-history').innerHTML = "";
        document.getElementById('btn-next-aprende').classList.add('hidden');
        document.getElementById('aprende-story').innerHTML = `<strong>Nivel ${state.level+1}:</strong> ${state.currentEx.s}`;
        
        const tut = document.getElementById('tut-box');
        if(state.topic === 'valor-absoluto' && state.currentEx.tut) {
            tut.innerHTML = `💡 ${state.currentEx.tut}`; tut.classList.remove('hidden');
        } else tut.classList.add('hidden');

        renderAprendeRow();
    }

    function renderAprendeRow() {
        const ex = state.currentEx;
        const hist = document.getElementById('aprende-history');
        const row = document.createElement('div');
        row.className = "step-row current"; row.id = "active-step";

        if(state.topic === 'ecuaciones') {
            document.getElementById('aprende-instr').innerText = "Toca el número naranja para despejar.";
            if(ex.type === 'simple') {
                row.innerHTML = `<div>x</div><div>${ex.op}</div><div class="draggable" onclick="moveSimple()">${ex.r}</div><div>=</div><div>${ex.target}</div>`;
            } else if(ex.type === 'div') {
                row.innerHTML = `<div class="draggable" onclick="moveDiv()">${ex.l}</div><div>x</div><div>=</div><div>${ex.target}</div>`;
            } else if(ex.type === 'mult') {
                row.innerHTML = `<div class="fraction"><span class="num">x</span><span class="draggable" onclick="moveMult()">${ex.l}</span></div><div>=</div><div>${ex.target}</div>`;
            } else if(ex.type === 'comp_mult' || ex.type === 'comp_div') {
                if(state.subStep === 0) {
                    row.innerHTML = `<div>${ex.expr.split('+')[0]}</div><div>+</div><div class="draggable" onclick="moveComp1()">${ex.r}</div><div>=</div><div>${ex.target}</div>`;
                } else {
                    const val = ex.target - ex.r;
                    if(ex.type === 'comp_mult') row.innerHTML = `<div class="draggable" onclick="moveComp2(${val})">${ex.a}</div><div>x</div><div>=</div><div>${val}</div>`;
                    else row.innerHTML = `<div class="fraction"><span class="num">x</span><span class="draggable" onclick="moveComp2(${val})">${ex.l}</span></div><div>=</div><div>${val}</div>`;
                }
            }
        } else {
            document.getElementById('aprende-instr').innerText = "Observa el proceso:";
            row.innerHTML = `<div>${ex.expr}</div><button class="btn-op" onclick="finishAprende()">Resolver</button>`;
        }
        hist.appendChild(row);
    }

    function moveSimple() {
        const ex = state.currentEx;
        fixOld();
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        row.innerHTML = `<div>x</div><div>=</div><div>${ex.target}</div><button class="btn-op" onclick="finishAprende()">${ex.inv}</button><div>${ex.r}</div>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function moveDiv() {
        const ex = state.currentEx;
        fixOld();
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        row.innerHTML = `<div>x</div><div>=</div><div class="fraction"><span class="num">${ex.target}</span><span class="den">${ex.l}</span></div><button class="btn-op" onclick="finishAprende()">÷</button>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function moveMult() {
        const ex = state.currentEx;
        fixOld();
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        row.innerHTML = `<div>x</div><div>=</div><div>${ex.target}</div><button class="btn-op" onclick="finishAprende()">·</button><div>${ex.l}</div>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function moveComp1() {
        const ex = state.currentEx;
        fixOld(); state.subStep = 1;
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        row.innerHTML = `<div>${ex.expr.split('+')[0]}</div><div>=</div><div>${ex.target}</div><button class="btn-op" onclick="renderAprendeRow()">-</button><div>${ex.r}</div>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function moveComp2(v) {
        const ex = state.currentEx;
        fixOld();
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        if(ex.type === 'comp_mult') row.innerHTML = `<div>x</div><div>=</div><div class="fraction"><span class="num">${v}</span><span class="den">${ex.a}</span></div><button class="btn-op" onclick="finishAprende()">÷</button>`;
        else row.innerHTML = `<div>x</div><div>=</div><div>${v}</div><button class="btn-op" onclick="finishAprende()">·</button><div>${ex.l}</div>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function finishAprende() {
        fixOld();
        const row = document.createElement('div'); row.className = "step-row current";
        row.innerHTML = `<div style="color:var(--success); font-weight:bold">Resultado: x = ${state.currentEx.res}</div>`;
        document.getElementById('aprende-history').appendChild(row);
        document.getElementById('btn-next-aprende').classList.remove('hidden');
    }

    function fixOld() { const s = document.getElementById('active-step'); if(s) { s.id = ""; s.className = "step-row old"; } }
    function nextAprende() { state.level++; if(state.level < 5) loadAprende(); else showScreen('scr-topic-menu'); }

    // --- MODO PRÁCTICA (STEP-BY-STEP) ---
    function loadPractica() {
        state.currentEx = getEx(state.topic, state.level);
        state.step = 0;
        showScreen('scr-practica');
        document.getElementById('practica-history').innerHTML = `<div class="step-row current">${state.currentEx.expr}</div>`;
        document.getElementById('practica-story').innerText = state.currentEx.s;
        document.getElementById('practica-prompt').innerText = "Escribe el siguiente paso:";
        document.getElementById('btn-next-practica').classList.add('hidden');
        document.getElementById('practica-input-zone').classList.remove('hidden');
        document.getElementById('practica-feedback').classList.add('hidden');
    }

    function checkPracticaStep() {
        const raw = document.getElementById('practica-input').value.toLowerCase().replace(/\s/g, '');
        const correctStr = state.currentEx.steps[state.step].toLowerCase().replace(/\s/g, '');
        const feed = document.getElementById('practica-feedback');

        // Normalización básica para permitir x=7 o solo 7 en el paso final
        if(raw === correctStr || (state.step === state.currentEx.steps.length-1 && raw === state.currentEx.res.toString())) {
            feed.innerText = "¡Correcto! Sigue así."; feed.className = "feedback correct";
            const hist = document.getElementById('practica-history');
            hist.lastChild.className = "step-row old";
            const row = document.createElement('div'); row.className = "step-row current";
            row.innerText = state.currentEx.steps[state.step];
            hist.appendChild(row);
            state.step++;
            document.getElementById('practica-input').value = "";
            if(state.step >= state.currentEx.steps.length) {
                document.getElementById('practica-input-zone').classList.add('hidden');
                document.getElementById('btn-next-practica').classList.remove('hidden');
            }
        } else {
            feed.innerText = `Incorrecto. El paso correcto era: ${state.currentEx.steps[state.step]}`;
            feed.className = "feedback wrong";
        }
        feed.classList.remove('hidden');
    }

    function nextPractica() { state.level++; if(state.level < 5) loadPractica(); else showScreen('scr-topic-menu'); }

    // --- EVALUACIÓN Y REPORTE ---
    function renderEval() {
        showScreen('scr-evalua');
        const cont = document.getElementById('evalua-container');
        cont.innerHTML = ""; state.quizPool = [];
        for(let i=0; i<5; i++) {
            const ex = getEx(state.topic, i);
            state.quizPool.push(ex);
            cont.innerHTML += `<div class="story-box" style="background:white"><strong>Nivel ${i+1}:</strong> ${ex.s}<br>Ecuación: ${ex.expr}<br><input type="number" id="ev-${i}" placeholder="Valor de x"></div>`;
        }
    }

    function gradeEval() {
        let nota = 0;
        const details = document.getElementById('report-details');
        details.innerHTML = "";
        
        state.quizPool.forEach((ex, i) => {
            const userVal = document.getElementById(`ev-${i}`).value;
            const isCorrect = parseInt(userVal) === ex.res;
            if(isCorrect) nota++;
            
            details.innerHTML += `
                <div class="report-card">
                    <div style="display:flex; justify-content:space-between">
                        <strong>Ejercicio ${i+1}</strong>
                        <span style="color:${isCorrect?'green':'red'}">${isCorrect?'✅':'❌'}</span>
                    </div>
                    <p>Ecuación: ${ex.expr}</p>
                    <p>Tu respuesta: ${userVal || 'Vacío'} | Correcta: ${ex.res}</p>
                    <button class="btn-op" style="background:var(--action-blue); font-size:0.8rem" onclick="toggleSol(${i})">Ver Solución Paso a Paso</button>
                    <div id="sol-${i}" class="sol-detail">${ex.steps.join('\n')}</div>
                </div>`;
        });
        
        state.finalNota = nota;
        document.getElementById('report-score').innerText = `${nota} / 5`;
        showScreen('scr-report');
    }

    function toggleSol(i) {
        const el = document.getElementById(`sol-${i}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function sendWA() {
        const msg = `*REPORTE EQUILIBRIA*\nEstudiante: ${state.name}\nTema: ${state.topic}\nNota: ${state.finalNota}/5`;
        window.open(`https://wa.me/56961410052?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
