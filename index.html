<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibria: Paso a Paso</title>
    <style>
        :root {
            --paper: #ffffff;
            --ink: #2d3748;
            --highlight: #ecc94b;
            --action: #4299e1;
            --success: #48bb78;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #edf2f7;
            display: flex;
            justify-content: center;
            padding: 20px;
            touch-action: manipulation;
        }

        #app-container {
            background: var(--paper);
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 25px;
            text-align: center;
            border: 2px solid #cbd5e0;
        }

        .instruction-box {
            background: #fffaf0;
            border: 1px solid #feebc8;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            min-height: 60px;
            font-weight: 500;
            color: #744210;
        }

        .equation-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 40px 0;
            min-height: 80px;
        }

        .term {
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
        }

        .interactive {
            background: var(--highlight);
            cursor: pointer;
            box-shadow: 0 0 15px var(--highlight);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .hidden { display: none; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #cbd5e0;
            font-size: 1rem;
        }

        button {
            background: var(--action);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
        }

        .wa-btn { background: #25D366; margin-top: 20px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h2>Bienvenido a Equilibria</h2>
        <p>Introduce tus datos para comenzar:</p>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="apellido" placeholder="Apellido">
        <input type="text" id="curso" placeholder="Curso">
        <button onclick="iniciar()">Empezar Misión</button>
    </div>

    <div id="game" class="hidden">
        <div class="instruction-box" id="instruction">
            ¡Hola! Vamos a despejar la X. Haz clic en el número que acompaña a la X.
        </div>

        <div class="equation-row" id="board">
            </div>

        <div id="controls"></div>
    </div>

    <div id="results" class="hidden">
        <h2>¡Excelente Trabajo!</h2>
        <p>Has completado todos los pasos con éxito.</p>
        <button class="wa-btn" onclick="enviarReporte()">Enviar progreso por WhatsApp</button>
    </div>
</div>

<script>
    const levels = [
        { id: 1, t1: 'x', op: '+', t2: '12', res: '30', final: 18, type: 'suma' },
        { id: 2, t1: 'x', op: '-', t2: '8', res: '20', final: 28, type: 'resta' },
        { id: 3, t1: '3', op: '*', t2: 'x', res: '21', final: 7, type: 'mult' },
        { id: 4, t1: 'x', op: '/', t2: '4', res: '5', final: 20, type: 'div' },
        { id: 5, t1: '2x', op: '+', t2: '6', res: '16', final: 5, type: 'mixta' }
    ];

    let currentLvl = 0;
    let step = 0;
    let userData = {};

    function iniciar() {
        userData.nombre = document.getElementById('nombre').value;
        userData.apellido = document.getElementById('apellido').value;
        userData.curso = document.getElementById('curso').value;
        if(!userData.nombre) return alert("Escribe tu nombre");
        
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        renderLevel();
    }

    function renderLevel() {
        const lvl = levels[currentLvl];
        const board = document.getElementById('board');
        step = 1;
        
        board.innerHTML = `
            <div id="term-left" class="term">${lvl.t1}</div>
            <div id="op" class="term">${lvl.op}</div>
            <div id="term-move" class="term interactive" onclick="handleStep()">${lvl.t2}</div>
            <div class="term">=</div>
            <div id="result" class="term">${lvl.res}</div>
        `;
        document.getElementById('instruction').innerText = `Paso 1: Para dejar sola a la X, toca el ${lvl.t2} para moverlo.`;
    }

    function handleStep() {
        const lvl = levels[currentLvl];
        const op = document.getElementById('op');
        const tMove = document.getElementById('term-move');
        const res = document.getElementById('result');
        const instr = document.getElementById('instruction');

        if (step === 1) {
            // Mover y cambiar signo
            tMove.classList.remove('interactive');
            op.style.opacity = '0';
            
            setTimeout(() => {
                op.innerText = '='; // El igual se queda, el operador se mueve
                const newOp = lvl.op === '+' ? '-' : (lvl.op === '-' ? '+' : (lvl.op === '*' ? '÷' : '•'));
                
                tMove.style.transform = 'translateX(100px)';
                tMove.style.opacity = '0';
                
                setTimeout(() => {
                    tMove.style.transform = 'translateX(0)';
                    tMove.innerText = newOp + ' ' + lvl.t2;
                    tMove.style.opacity = '1';
                    tMove.classList.add('interactive');
                    tMove.style.color = 'red';
                    instr.innerText = `¡Bien! El ${lvl.op}${lvl.t2} pasó al otro lado como ${newOp}${lvl.t2}. Ahora tócalo para calcular.`;
                    step = 2;
                }, 500);
            }, 300);

        } else if (step === 2) {
            // Calcular final
            tMove.classList.remove('interactive');
            res.innerText = lvl.final;
            tMove.style.opacity = '0';
            op.style.opacity = '0';
            instr.innerText = `¡Logrado! X es igual a ${lvl.final}.`;
            
            setTimeout(() => {
                if (currentLvl < levels.length - 1) {
                    currentLvl++;
                    renderLevel();
                } else {
                    finalizar();
                }
            }, 2000);
        }
    }

    function finalizar() {
        document.getElementById('game').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
    }

    function enviarReporte() {
        const tel = "56961410052";
        const msg = `*REPORTE EQUILIBRIA (TEA)*\n\n` +
                    `Estudiante: ${userData.nombre} ${userData.apellido}\n` +
                    `Curso: ${userData.curso}\n` +
                    `Estado: ¡Completó los 5 niveles de guía interactiva! ✅`;
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
