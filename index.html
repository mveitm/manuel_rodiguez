<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.Veit - Equilibria Pro</title>
    <style>
        :root {
            --paper: #fdfdfd;
            --ink: #1e293b;
            --mrveit: #2563eb;
            --accent: #f59e0b;
            --success: #10b981;
            --grid: #e2e8f0;
        }

        body {
            font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
            background-color: var(--grid);
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--ink);
        }

        #app {
            background: var(--paper);
            width: 95%;
            max-width: 650px;
            margin: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 25px;
            border: 3px solid var(--mrveit);
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--mrveit);
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px #bfdbfe;
        }

        .screen { display: none; }
        .active { display: block; }

        .story-box {
            background: #fffbeb;
            border: 2px solid #fef3c7;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .board {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            height: 120px;
            font-size: 2.5rem;
            background: #f8fafc;
            border-radius: 12px;
            margin: 20px 0;
        }

        .draggable {
            background: var(--accent);
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: grab;
            transition: transform 0.2s;
        }

        .drop-zone {
            width: 80px;
            height: 80px;
            border: 3px dashed #94a3b8;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f1f5f9;
        }

        .btn-op {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .quiz-card {
            background: white;
            border: 2px solid var(--grid);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--mrveit);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .wa-btn { background: #22c55e; }
        .retry-btn { background: #64748b; }

        .feedback {
            font-size: 1.3rem;
            color: var(--mrveit);
            text-align: center;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="logo">Mr.Veit</div>

    <div id="scr-start" class="screen active">
        <h3 style="text-align:center">¡Bienvenido a Equilibria!</h3>
        <p>Aprende a resolver ecuaciones con historias y juegos.</p>
        <input type="text" id="nombre" placeholder="Tu Nombre">
        <input type="text" id="apellido" placeholder="Tu Apellido">
        <input type="text" id="curso" placeholder="Tu Curso">
        <button onclick="nav('scr-learn')">¡Empezar a Aprender!</button>
    </div>

    <div id="scr-learn" class="screen">
        <div class="story-box" id="learn-story"></div>
        <div id="learn-instr" style="text-align:center; font-weight:bold; color:var(--mrveit)"></div>
        <div class="board" id="learn-board"></div>
        <button id="btn-next-learn" class="hidden" onclick="nextLearnLevel()">Siguiente Historia</button>
    </div>

    <div id="scr-quiz" class="screen">
        <h3>🎯 Desafío Final</h3>
        <p>Resuelve estos ejercicios en tu cuaderno e ingresa los resultados aquí:</p>
        <div id="quiz-container"></div>
        <button onclick="evaluarQuiz()">Ver mis resultados</button>
    </div>

    <div id="scr-results" class="screen">
        <div id="feedback-msg" class="feedback"></div>
        <div id="score-display" style="text-align:center; font-size: 2rem; margin-bottom: 20px;"></div>
        <button class="wa-btn" onclick="enviarReporte()">Enviar a Mr.Veit (WhatsApp)</button>
        <button class="retry-btn" onclick="reiniciarTodo()">Intentar con nuevos números</button>
    </div>
</div>

<script>
    // Configuración de niveles de aprendizaje (historias fijas)
    const learnLevels = [
        { s: "Ana tiene x dulces. Su tío le regala 15 más y ahora tiene 40. ¿Cuántos tenía?", l: "x", op: "+", r: "15", target: "40", inv: "-", res: 25 },
        { s: "Un avión tiene x asientos. Se bajan 20 pasajeros y quedan 100. ¿Cuántos asientos hay?", l: "x", op: "-", r: "20", target: "100", inv: "+", res: 120 }
    ];

    let curLearn = 0;
    let learnStep = 1;
    let quizData = [];
    let userData = {};

    function nav(id) {
        if(id === 'scr-learn') {
            userData.n = document.getElementById('nombre').value;
            userData.a = document.getElementById('apellido').value;
            userData.c = document.getElementById('curso').value;
            if(!userData.n) return alert("Escribe tu nombre");
            loadLearn();
        }
        if(id === 'scr-quiz') generateQuiz();
        
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- LÓGICA APRENDIZAJE ---
    function loadLearn() {
        const lv = learnLevels[curLearn];
        learnStep = 1;
        document.getElementById('learn-story').innerText = lv.s;
        document.getElementById('learn-instr').innerText = `Arrastra el ${lv.op}${lv.r} al otro lado.`;
        
        const board = document.getElementById('learn-board');
        board.innerHTML = `
            <div>x</div><div>${lv.op}</div>
            <div id="drag-item" class="draggable" draggable="true" ondragstart="evDrag(event)">${lv.r}</div>
            <div>=</div><div>${lv.target}</div>
            <div class="drop-zone" ondrop="evDrop(event)" ondragover="evAllow(event)">?</div>
        `;
    }

    function evAllow(e) { e.preventDefault(); }
    function evDrag(e) { e.dataTransfer.setData("text", e.target.id); }
    function evDrop(e) {
        e.preventDefault();
        const lv = learnLevels[curLearn];
        const board = document.getElementById('learn-board');
        board.innerHTML = `
            <div>x</div><div>=</div><div>${lv.target}</div>
            <div class="btn-op" onclick="finishLearnStep()">${lv.inv}</div><div>${lv.r}</div>
        `;
        document.getElementById('learn-instr').innerText = `¡Bien! Ahora toca el signo ${lv.inv} para resolver.`;
        learnStep = 2;
    }

    function finishLearnStep() {
        const lv = learnLevels[curLearn];
        document.getElementById('learn-board').innerHTML = `<div>x</div><div>=</div><div style="color:var(--success)">${lv.res}</div>`;
        document.getElementById('learn-instr').innerText = "¡Excelente! Nivel completado.";
        
        setTimeout(() => {
            curLearn++;
            if(curLearn < learnLevels.length) loadLearn();
            else nav('scr-quiz');
        }, 2000);
    }

    // --- LÓGICA QUIZ (ALEATORIO) ---
    function generateQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = "";
        quizData = [];

        for(let i=1; i<=5; i++) {
            let a = Math.floor(Math.random() * 20) + 2;
            let b = Math.floor(Math.random() * 50) + 21;
            let eq, correct;

            if(i===1) { eq = `x + ${a} = ${b}`; correct = b - a; }
            if(i===2) { eq = `x - ${a} = ${b}`; correct = b + a; }
            if(i===3) { 
                let resMult = a * (Math.floor(Math.random()*9)+2);
                eq = `${a}x = ${resMult}`; correct = resMult / a; 
            }
            if(i===4) { eq = `x / ${a} = 5`; correct = 5 * a; }
            if(i===5) {
                let xVal = Math.floor(Math.random()*10)+1;
                let resC = (a * xVal) + 5;
                eq = `${a}x + 5 = ${resC}`; correct = xVal;
            }

            quizData.push({ eq, ans: correct });
            container.innerHTML += `
                <div class="quiz-card">
                    <strong>Nivel ${i}:</strong> ${eq}
                    <input type="number" id="q-ans-${i}" placeholder="Tu resultado">
                </div>
            `;
        }
    }

    function evaluarQuiz() {
        let score = 0;
        quizData.forEach((d, idx) => {
            const userVal = parseInt(document.getElementById(`q-ans-${idx+1}`).value);
            if(userVal === d.ans) score++;
        });

        const msgs = [
            "¡Sigue intentando, tú puedes!", 
            "¡Buen comienzo! Vamos por más.", 
            "¡Vas muy bien, sigue practicando!", 
            "¡Casi perfecto! Eres genial.", 
            "¡Increíble! ¡Eres un Maestro de las Ecuaciones!"
        ];
        
        document.getElementById('feedback-msg').innerText = score === 5 ? "🌟 " + msgs[4] : "✨ " + msgs[score-1 || 0];
        document.getElementById('score-display').innerText = `${score} / 5`;
        userData.ultimoScore = score;
        nav('scr-results');
    }

    function enviarReporte() {
        const url = `https://wa.me/56961410052?text=${encodeURIComponent(
            `*MR. VEIT - REPORTE DE ECUACIONES*\nEstudiante: ${userData.n} ${userData.a}\nCurso: ${userData.c}\nResultado: ${userData.ultimoScore} de 5 correctas. ✅`
        )}`;
        window.open(url);
    }

    function reiniciarTodo() {
        curLearn = 0;
        nav('scr-start');
    }
</script>
</body>
</html>
