<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesor Mauricio - Aprende Matemáticas</title>
    <style>
        :root {
            --primary-blue: #1e40af; /* Azul */
            --action-cyan: #06b6d4;  /* Cian */
            --attention-yellow: #facc15; /* Amarillo */
            --highlight-orange: #f97316; /* Naranja */
            --bg-light: #f8fafc;
            --text-dark: #0f172a;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-light); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-dark); }
        #app { background: var(--white); width: 95%; max-width: 650px; margin: 20px; border-radius: 24px; box-shadow: 0 20px 40px rgba(30, 64, 175, 0.1); padding: 25px; border-top: 8px solid var(--primary-blue); position: relative; }
        
        .btn-back { position: absolute; top: 15px; left: 15px; background: none; border: none; color: var(--primary-blue); cursor: pointer; font-weight: bold; }
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary-blue); margin: 0; line-height: 1.2; }

        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        .btn-main { background: var(--primary-blue); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; margin-bottom: 12px; transition: 0.2s; border-bottom: 4px solid #1e3a8a; }
        .btn-main:hover { background: #1d4ed8; transform: translateY(-2px); }
        
        .btn-alt { background: var(--white); color: var(--text-dark); border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; text-align: left; transition: 0.2s; }
        .btn-alt:hover { border-color: var(--action-cyan); background: #ecfeff; }

        .story-box { background: #eff6ff; border-left: 5px solid var(--action-cyan); padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 1.05rem; }
        .history-container { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; padding: 15px; background: #f1f5f9; border-radius: 18px; border: 1px solid #e2e8f0; }
        
        .step-row { display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 1.6rem; padding: 10px; font-weight: 600; }
        .step-row.current { background: var(--attention-yellow); border-radius: 12px; color: var(--primary-blue); }
        .step-row.old { opacity: 0.4; font-size: 1.2rem; }

        .fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; line-height: 1; margin: 0 5px; }
        .num { border-bottom: 3px solid var(--primary-blue); padding: 0 10px; width: 100%; text-align: center; }
        .den { padding: 0 10px; width: 100%; text-align: center; }

        .highlight-box { background: var(--highlight-orange); color: white; padding: 4px 12px; border-radius: 8px; cursor: pointer; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 1rem; }
        .feedback { font-weight: bold; padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .correct { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .wrong { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

        .report-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 16px; margin-bottom: 12px; }
        .sol-detail { background: #ffffff; padding: 12px; border-radius: 10px; margin-top: 10px; display: none; font-family: 'Courier New', monospace; border: 1px solid var(--action-cyan); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <button id="global-back" class="btn-back hidden" onclick="goBack()">← VOLVER</button>
    <div class="logo-container">
        <h1 class="logo">Aprende Matemáticas<br><span style="color:var(--highlight-orange)">con el Profesor Mauricio</span></h1>
    </div>

    <div id="scr-welcome" class="screen active">
        <div style="text-align:center; margin-bottom: 20px;">
            <p>¡Hola! Soy el Profesor Mauricio y hoy dominaremos las matemáticas juntos.</p>
        </div>
        <input type="text" id="user-name" placeholder="Escribe tu nombre aquí...">
        <button class="btn-main" onclick="goToMenu()">Comenzar Clase</button>
    </div>

    <div id="scr-main-menu" class="screen">
        <h3 style="text-align:center">¿Qué quieres aprender hoy?</h3>
        <button class="btn-main" onclick="openTopic('ecuaciones')">1. Ecuaciones de 1er Grado</button>
        <button class="btn-main" style="background:var(--action-cyan); border-color:#0891b2" onclick="openTopic('valor-absoluto')">2. Valor Absoluto</button>
    </div>

    <div id="scr-topic-menu" class="screen">
        <h2 id="topic-title" style="text-align:center; color:var(--primary-blue)"></h2>
        <button class="btn-main" onclick="startMode('aprende')">Ver Explicación Visual</button>
        <button class="btn-main" style="background:var(--action-cyan); border-color:#0891b2" onclick="startMode('practica')">Practicar con Alternativas</button>
        <button class="btn-main" style="background:var(--highlight-orange); border-color:#c2410c" onclick="startMode('evalua')">Realizar Evaluación</button>
    </div>

    <div id="scr-aprende" class="screen">
        <div class="story-box" id="aprende-story"></div>
        <div id="tut-box" class="hidden" style="background:var(--attention-yellow); padding:15px; border-radius:12px; margin-bottom:15px; font-weight:600"></div>
        <div class="history-container" id="aprende-history"></div>
        <p id="aprende-instr" style="text-align:center; font-weight:bold; color:var(--primary-blue)"></p>
        <button id="btn-next-aprende" class="hidden btn-main" onclick="nextAprende()">Siguiente Nivel →</button>
    </div>

    <div id="scr-practica" class="screen">
        <div class="story-box" id="practica-story"></div>
        <div id="practica-history" class="history-container"></div>
        <div id="practica-zone">
            <p style="text-align:center; font-weight:bold">Elige el paso correcto:</p>
            <div id="practica-options" style="display:grid; gap:10px"></div>
            <div id="practica-feedback" class="feedback hidden"></div>
        </div>
        <button id="btn-next-practica" class="btn-main hidden" onclick="nextPractica()">Continuar →</button>
    </div>

    <div id="scr-evalua" class="screen">
        <h3 style="text-align:center">Evaluación de Nivel</h3>
        <div id="evalua-container"></div>
        <button class="btn-main" style="background:var(--highlight-orange); border-color:#c2410c" onclick="gradeEval()">Finalizar y Ver Nota</button>
    </div>

    <div id="scr-report" class="screen">
        <h2 style="text-align:center">Tu Reporte Final</h2>
        <div id="report-score" style="text-align:center; font-size: 3.5rem; font-weight:900; color:var(--primary-blue)"></div>
        <div id="report-details" style="margin-top:20px"></div>
        <button class="btn-main" onclick="sendWA()">Enviar al Profesor Mauricio</button>
        <button class="btn-main" style="background:#64748b; border:none" onclick="showScreen('scr-main-menu')">Volver al Inicio</button>
    </div>
</div>

<script>
    let state = { name:"", topic:"", mode:"", level:0, currentEx:null, step:0, quiz:[] };

    function getEx(topic, lvl) {
        const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        if(topic === 'ecuaciones') {
            let x = r(2, 12);
            switch(lvl) {
                case 0: let a0 = r(5, 20); return { s:`Si a un número x le sumas ${a0}, obtienes ${x+a0}.`, expr:`x + ${a0} = ${x+a0}`, steps:[`x = ${x+a0} - ${a0}`, `x = ${x}`], res:x, type:'simple', op:'+', inv:'-', r:a0, target:x+a0 };
                case 1: let a1 = r(2, 8); return { s:`El producto de ${a1} por x es ${a1*x}.`, expr:`${a1}x = ${a1*x}`, steps:[`x = ${a1*x} / ${a1}`, `x = ${x}`], res:x, type:'div', l:a1, target:a1*x };
                case 2: let a2 = r(2, 5), b2 = r(2, 15); return { s:`${a2} veces x más ${b2} es igual a ${a2*x+b2}.`, expr:`${a2}x + ${b2} = ${a2*x+b2}`, steps:[`${a2}x = ${a2*x+b2} - ${b2}`, `${a2}x = ${a2*x}`, `x = ${a2*x} / ${a2}`, `x = ${x}`], res:x, type:'c_mult', a:a2, r:b2, target:a2*x+b2 };
                case 3: let a3 = r(2, 10); return { s:`La división de x por ${a3} da como resultado ${x}.`, expr:`x / ${a3} = ${x}`, steps:[`x = ${x} * ${a3}`, `x = ${x*a3}`], res:x*a3, type:'mult', l:a3, target:x };
                case 4: let a4 = r(2, 5), b4 = r(1, 10); return { s:`x dividido en ${a4} sumado con ${b4} es ${x+b4}.`, expr:`x / ${a4} + ${b4} = ${x+b4}`, steps:[`x / ${a4} = ${x+b4} - ${b4}`, `x / ${a4} = ${x}`, `x = ${x} * ${a4}`, `x = ${x*a4}`], res:x*a4, type:'c_div', l:a4, r:b4, target:x+b4 };
            }
        } else {
            let x = r(2, 20);
            switch(lvl) {
                case 0: return { s:`¿Qué valores de x cumplen con la distancia ${x} al origen?`, expr:`|x| = ${x}`, steps:[`x = ${x}`, `x = -${x}`], res:x, tut:"REGLA DE ORO: El valor absoluto |x| siempre es positivo, sin importar si adentro hay un número positivo o negativo. ¡La distancia no tiene signo!" };
                case 1: let b1 = r(2, 10); return { s:`El valor absoluto de x aumentado en ${b1} es ${x+b1}.`, expr:`|x| + ${b1} = ${x+b1}`, steps:[`|x| = ${x+b1} - ${b1}`, `x = ${x}`], res:x };
                case 2: let b2 = r(1, 15); return { s:`La distancia entre x y el punto ${b2} es ${x}.`, expr:`|x - ${b2}| = ${x}`, steps:[`x - ${b2} = ${x}`, `x = ${x+b2}`], res:x+b2 };
                case 3: return { s:`Dos veces la distancia de x al cero es ${2*x}.`, expr:`2|x| = ${2*x}`, steps:[`|x| = ${2*x} / 2`, `x = ${x}`], res:x };
                case 4: let b4 = r(1, 5); return { s:`Doble de la distancia entre x y ${b4} es ${2*x}.`, expr:`2|x - ${b4}| = ${2*x}`, steps:[`|x - ${b4}| = ${x}`, `x - ${b4} = ${x}`, `x = ${x+b4}`], res:x+b4 };
            }
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('global-back').classList.toggle('hidden', id === 'scr-welcome' || id === 'scr-report');
    }

    function goBack() {
        const active = document.querySelector('.screen.active').id;
        if(active === 'scr-main-menu') showScreen('scr-welcome');
        else if(active === 'scr-topic-menu') showScreen('scr-main-menu');
        else showScreen('scr-topic-menu');
    }

    function goToMenu() { state.name = document.getElementById('user-name').value || "Estudiante"; showScreen('scr-main-menu'); }
    function openTopic(t) { state.topic = t; document.getElementById('topic-title').innerText = t === 'ecuaciones' ? "Ecuaciones" : "Valor Absoluto"; showScreen('scr-topic-menu'); }

    function startMode(m) {
        state.level = 0; state.mode = m;
        if(m === 'aprende') loadAprende();
        else if(m === 'practica') loadPractica();
        else renderEval();
    }

    // --- MODO APRENDE (INTERACTIVO) ---
    function loadAprende() {
        state.currentEx = getEx(state.topic, state.level);
        state.subStep = 0;
        showScreen('scr-aprende');
        document.getElementById('aprende-history').innerHTML = "";
        document.getElementById('btn-next-aprende').classList.add('hidden');
        document.getElementById('aprende-story').innerHTML = `<strong>Nivel ${state.level+1}:</strong> ${state.currentEx.s}`;
        
        const tut = document.getElementById('tut-box');
        if(state.topic === 'valor-absoluto' && state.level === 0) {
            tut.innerHTML = `💡 Nota que |${state.currentEx.res}| = ${state.currentEx.res} y también |-${state.currentEx.res}| = ${state.currentEx.res}. El interior puede ser negativo, pero el resultado siempre es el valor numérico positivo.`;
            tut.classList.remove('hidden');
        } else tut.classList.add('hidden');
        renderAprendeRow();
    }

    function renderAprendeRow() {
        const ex = state.currentEx;
        const row = document.createElement('div');
        row.className = "step-row current"; row.id = "active-step";
        if(state.topic === 'ecuaciones') {
            document.getElementById('aprende-instr').innerText = "Toca el número naranja para moverlo.";
            if(ex.type === 'simple') row.innerHTML = `<div>x</div><div>${ex.op}</div><div class="highlight-box" onclick="moveSimple()">${ex.r}</div><div>=</div><div>${ex.target}</div>`;
            else if(ex.type === 'div') row.innerHTML = `<div class="highlight-box" onclick="moveDiv()">${ex.l}</div><div>x</div><div>=</div><div>${ex.target}</div>`;
            else if(ex.type === 'mult') row.innerHTML = `<div class="fraction"><span class="num">x</span><span class="den highlight-box" onclick="moveMult()">${ex.l}</span></div><div>=</div><div>${ex.target}</div>`;
            else if(ex.type === 'c_mult' || ex.type === 'c_div') {
                if(state.subStep === 0) row.innerHTML = `<div>${ex.expr.split('+')[0]}</div><div>+</div><div class="highlight-box" onclick="moveC1()">${ex.r}</div><div>=</div><div>${ex.target}</div>`;
                else {
                    const v = ex.target - ex.r;
                    if(ex.type === 'c_mult') row.innerHTML = `<div class="highlight-box" onclick="moveC2(${v})">${ex.a}</div><div>x</div><div>=</div><div>${v}</div>`;
                    else row.innerHTML = `<div class="fraction"><span class="num">x</span><span class="den highlight-box" onclick="moveC2(${v})">${ex.l}</span></div><div>=</div><div>${v}</div>`;
                }
            }
        } else {
            document.getElementById('aprende-instr').innerText = "Analiza el resultado:";
            row.innerHTML = `<div>${ex.expr}</div> <button class="btn-main" style="width:auto; padding:5px 15px" onclick="finishAprende()">Resolver</button>`;
        }
        document.getElementById('aprende-history').appendChild(row);
    }

    function moveSimple() { fixOld(); addRow(`<div>x</div><div>=</div><div>${state.currentEx.target}</div><div style="color:var(--highlight-orange)">${state.currentEx.inv}</div><div class="highlight-box" onclick="finishAprende()">${state.currentEx.r}</div>`); }
    function moveDiv() { fixOld(); addRow(`<div>x</div><div>=</div><div class="fraction"><span class="num">${state.currentEx.target}</span><span class="den highlight-box" onclick="finishAprende()">${state.currentEx.l}</span></div>`); }
    function moveMult() { fixOld(); addRow(`<div>x</div><div>=</div><div>${state.currentEx.target}</div><div style="color:var(--highlight-orange)">·</div><div class="highlight-box" onclick="finishAprende()">${state.currentEx.l}</div>`); }
    function moveC1() { fixOld(); state.subStep=1; addRow(`<div>${state.currentEx.expr.split('+')[0]}</div><div>=</div><div>${state.currentEx.target}</div><div style="color:var(--highlight-orange)">-</div><div class="highlight-box" onclick="renderAprendeRow()">${state.currentEx.r}</div>`); }
    function moveC2(v) { fixOld(); if(state.currentEx.type ==='c_mult') addRow(`<div>x</div><div>=</div><div class="fraction"><span class="num">${v}</span><span class="den highlight-box" onclick="finishAprende()">${state.currentEx.a}</span></div>`); else addRow(`<div>x</div><div>=</div><div>${v}</div><div style="color:var(--highlight-orange)">·</div><div class="highlight-box" onclick="finishAprende()">${state.currentEx.l}</div>`); }
    function fixOld() { const s = document.getElementById('active-step'); if(s){ s.id=""; s.className="step-row old";} }
    function addRow(html) { const r = document.createElement('div'); r.className="step-row current"; r.id="active-step"; r.innerHTML=html; document.getElementById('aprende-history').appendChild(r); }
    function finishAprende() { fixOld(); addRow(`<div style="color:var(--primary-blue)">x = ${state.currentEx.res}</div>`); document.getElementById('btn-next-aprende').classList.remove('hidden'); }
    function nextAprende() { state.level++; if(state.level < 5) loadAprende(); else showScreen('scr-topic-menu'); }

    // --- MODO PRÁCTICA (ALTERNATIVAS) ---
    function loadPractica() {
        state.currentEx = getEx(state.topic, state.level);
        state.step = 0;
        showScreen('scr-practica');
        document.getElementById('practica-history').innerHTML = `<div class="step-row current">${state.currentEx.expr}</div>`;
        document.getElementById('practica-story').innerText = state.currentEx.s;
        document.getElementById('btn-next-practica').classList.add('hidden');
        document.getElementById('practica-zone').classList.remove('hidden');
        document.getElementById('practica-feedback').classList.add('hidden');
        renderAlts();
    }

    function renderAlts() {
        const correct = state.currentEx.steps[state.step];
        const alts = [correct, genDistractor(correct), genDistractor(correct)];
        alts.sort(() => Math.random() - 0.5);
        const optCont = document.getElementById('practica-options');
        optCont.innerHTML = "";
        alts.forEach(a => {
            const b = document.createElement('button');
            b.className = "btn-alt";
            b.innerText = a;
            b.onclick = () => checkAlt(a, correct);
            optCont.appendChild(b);
        });
    }

    function genDistractor(correct) {
        if(correct.includes(' - ')) return correct.replace(' - ', ' + ');
        if(correct.includes(' / ')) return correct.replace(' / ', ' * ');
        if(correct.includes(' * ')) return correct.replace(' * ', ' / ');
        if(correct.startsWith('x = ')) return `x = ${parseInt(correct.split('=')[1]) + 3}`;
        return `x = ${Math.floor(Math.random()*20)}`;
    }

    function checkAlt(selected, correct) {
        const feed = document.getElementById('practica-feedback');
        if(selected === correct) {
            feed.innerText = "¡Excelente elección!"; feed.className = "feedback correct";
            const hist = document.getElementById('practica-history');
            hist.lastChild.className = "step-row old";
            const row = document.createElement('div'); row.className = "step-row current"; row.innerText = correct;
            hist.appendChild(row);
            state.step++;
            if(state.step < state.currentEx.steps.length) renderAlts();
            else {
                document.getElementById('practica-zone').classList.add('hidden');
                document.getElementById('btn-next-practica').classList.remove('hidden');
            }
        } else {
            feed.innerText = `Casi. El profesor Mauricio sugiere: ${correct}`; feed.className = "feedback wrong";
        }
        feed.classList.remove('hidden');
    }

    function nextPractica() { state.level++; if(state.level < 5) loadPractica(); else showScreen('scr-topic-menu'); }

    // --- EVALUACIÓN ---
    function renderEval() {
        showScreen('scr-evalua');
        const cont = document.getElementById('evalua-container');
        cont.innerHTML = ""; state.quiz = [];
        for(let i=0; i<5; i++) {
            let ex = getEx(state.topic, i); state.quiz.push(ex);
            cont.innerHTML += `<div class="report-card"><strong>Reto ${i+1}:</strong> ${ex.s}<br><div class="step-row">${ex.expr}</div><input type="number" id="ev-${i}" placeholder="Valor de x"></div>`;
        }
    }

    function gradeEval() {
        let nota = 0; const details = document.getElementById('report-details'); details.innerHTML = "";
        state.quiz.forEach((ex, i) => {
            let val = document.getElementById(`ev-${i}`).value;
            let ok = parseInt(val) === ex.res; if(ok) nota++;
            details.innerHTML += `
                <div class="report-card">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <strong>Ejercicio ${i+1}</strong>
                        <span style="font-size:1.5rem">${ok?'✅':'❌'}</span>
                    </div>
                    <p style="font-size:1.2rem; text-align:center">${ex.expr}</p>
                    <p>Respuesta: x = ${val || '?'} | Correcta: x = ${ex.res}</p>
                    <button class="btn-alt" style="width:100%; padding:8px" onclick="toggleSol(${i})">Revisar Paso a Paso</button>
                    <div id="sol-${i}" class="sol-detail">${ex.steps.join('  ➔  ')}</div>
                </div>`;
        });
        state.finalNota = nota;
        document.getElementById('report-score').innerText = `${nota}/5`;
        showScreen('scr-report');
    }

    function toggleSol(i) {
        const el = document.getElementById(`sol-${i}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function sendWA() {
        const msg = `*REPORTE MATEMÁTICO - PROF. MAURICIO*\nEstudiante: ${state.name}\nTema: ${state.topic}\nLogro: ${state.finalNota} de 5 correctas.`;
        window.open(`https://wa.me/56961410052?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
