<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibria: El Secreto de la X</title>
    <style>
        :root {
            --paper-color: #fcfcfc;
            --grid-color: #e0ebf3;
            --math-blue: #2c5282;
            --accent-orange: #ed8936;
            --success-green: #48bb78;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--grid-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        #app-container {
            background-color: var(--paper-color);
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #d1d5db;
            padding: 30px;
            position: relative;
        }

        h1 { color: var(--math-blue); text-align: center; border-bottom: 2px solid var(--math-blue); padding-bottom: 10px; }

        .setup-section, .quiz-section { display: none; }
        .active { display: block; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .balance-box {
            background: #f7fafc;
            border: 2px dashed var(--math-blue);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .equation-display {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--math-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background-color: #1a365d; }

        .level-card {
            background: #fff;
            border-left: 5px solid var(--accent-orange);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .whatsapp-btn { background-color: #25D366; font-weight: bold; }
        .whatsapp-btn:hover { background-color: #128C7E; }

        .progress-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #cbd5e0;
            margin: 0 5px;
        }
        .dot-done { background: var(--success-green); }
    </style>
</head>
<body>

<div id="app-container">
    <h1>Equilibria ⚖️</h1>

    <div id="step-1" class="setup-section active">
        <h3>Identificación del Estudiante</h3>
        <p>Antes de comenzar la misión, necesitamos tus datos:</p>
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellido" placeholder="Apellido" required>
        <input type="text" id="curso" placeholder="Curso (ej: 7mo Básico A)" required>
        <button onclick="startApp()">Comenzar Aprendizaje</button>
    </div>

    <div id="step-2" class="quiz-section">
        <div id="progress-bar" style="text-align:center; margin-bottom: 20px;">
            <span class="progress-dot" id="dot-0"></span>
            <span class="progress-dot" id="dot-1"></span>
            <span class="progress-dot" id="dot-2"></span>
            <span class="progress-dot" id="dot-3"></span>
            <span class="progress-dot" id="dot-4"></span>
        </div>

        <div class="level-card">
            <h4 id="level-title">Nivel 1: El Despeje</h4>
            <p id="level-desc">Recuerda: Si algo suma, pasa al otro lado restando para mantener el equilibrio.</p>
        </div>

        <div class="balance-box">
            <div class="equation-display" id="current-equation">x + 7 = 21</div>
            <input type="number" id="user-answer" placeholder="¿Cuánto vale x?">
            <button onclick="checkAnswer()">Validar y Continuar</button>
        </div>
    </div>

    <div id="step-3" class="quiz-section">
        <h3>¡Misión Cumplida! 🎓</h3>
        <p>Has completado los 5 niveles de equilibrio algebraico.</p>
        <div id="results-summary" style="margin-bottom: 20px;"></div>
        <button class="whatsapp-btn" onclick="sendToWhatsApp()">Enviar Resultados al Profesor</button>
    </div>
</div>

<script>
    const levels = [
        { title: "Nivel 1: Sumas y Restas", eq: "x + 12 = 30", ans: 18, desc: "Aísla la x restando 12 en ambos lados." },
        { title: "Nivel 2: Multiplicaciones", eq: "3x = 21", ans: 7, desc: "Si el 3 multiplica a la x, divídelo en el otro lado." },
        { title: "Nivel 3: Operaciones Combinadas", eq: "2x + 5 = 17", ans: 6, desc: "Primero resta el 5, luego divide por 2." },
        { title: "Nivel 4: X en ambos lados", eq: "5x - 4 = 3x + 6", ans: 5, desc: "Lleva las x a un lado y los números al otro." },
        { title: "Nivel 5: Desafío de Fracciones", eq: "x/2 + 1/4 = 3/4", ans: 1, desc: "Multiplica todo por 4 o resta las fracciones primero." }
    ];

    let currentLevel = 0;
    let studentData = {};
    let scores = [];

    function startApp() {
        studentData.nombre = document.getElementById('nombre').value;
        studentData.apellido = document.getElementById('apellido').value;
        studentData.curso = document.getElementById('curso').value;

        if(!studentData.nombre || !studentData.apellido || !studentData.curso) {
            alert("Por favor, completa todos los campos.");
            return;
        }

        document.getElementById('step-1').classList.remove('active');
        document.getElementById('step-2').classList.add('active');
        loadLevel();
    }

    function loadLevel() {
        const level = levels[currentLevel];
        document.getElementById('level-title').innerText = level.title;
        document.getElementById('level-desc').innerText = level.desc;
        document.getElementById('current-equation').innerText = level.eq;
        document.getElementById('user-answer').value = "";
        document.getElementById(`dot-${currentLevel}`).classList.add('dot-done');
    }

    function checkAnswer() {
        const userVal = parseFloat(document.getElementById('user-answer').value);
        const correctVal = levels[currentLevel].ans;

        if (isNaN(userVal)) {
            alert("Ingresa un número para continuar.");
            return;
        }

        scores.push({
            level: currentLevel + 1,
            equation: levels[currentLevel].eq,
            correct: userVal === correctVal,
            given: userVal
        });

        currentLevel++;

        if (currentLevel < levels.length) {
            loadLevel();
        } else {
            showFinalResults();
        }
    }

    function showFinalResults() {
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-3').classList.add('active');
        
        let summaryHtml = "<ul>";
        scores.forEach(s => {
            summaryHtml += `<li><strong>${s.equation}</strong>: ${s.correct ? '✅ Correcto' : '❌ Error (Puso: '+s.given+')'}</li>`;
        });
        summaryHtml += "</ul>";
        document.getElementById('results-summary').innerHTML = summaryHtml;
    }

    function sendToWhatsApp() {
        const phone = "56961410052";
        let message = `*EVALUACIÓN EQUILIBRIA*\n`;
        message += `--------------------------\n`;
        message += `👤 *Estudiante:* ${studentData.nombre} ${studentData.apellido}\n`;
        message += `📚 *Curso:* ${studentData.curso}\n`;
        message += `--------------------------\n`;
        
        scores.forEach(s => {
            message += `Nivel ${s.level}: ${s.equation} -> ${s.correct ? '✅' : '❌ (Respuesta: '+s.given+')'}\n`;
        });

        const totalCorrect = scores.filter(s => s.correct).length;
        message += `--------------------------\n`;
        message += `📊 *Puntaje Total:* ${totalCorrect} de 5`;

        const encodedMsg = encodeURIComponent(message);
        window.open(`https://wa.me/${phone}?text=${encodedMsg}`, '_blank');
    }
</script>

</body>
</html>
