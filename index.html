<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.Veit - Equilibria Pro V3</title>
    <style>
        :root {
            --bg-warm: #fffdfa;
            --paper: #ffffff;
            --text-dark: #451a03;
            --mrveit: #d97706;
            --accent: #f59e0b;
            --success: #059669;
            --action-blue: #3b82f6;
            --trace: #e2e8f0;
            --danger: #ef4444;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-warm); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-dark); }
        #app { background: var(--paper); width: 95%; max-width: 650px; margin: 20px; border-radius: 24px; box-shadow: 0 15px 35px rgba(69, 26, 3, 0.1); padding: 25px; border: 4px solid var(--mrveit); display: flex; flex-direction: column; }
        
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--mrveit); margin: 0; }
        .teacher-tag { font-size: 0.9rem; color: #92400e; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }

        .menu-grid { display: grid; gap: 15px; margin-top: 20px; }
        .btn-main { 
            background: white; border: 2px solid var(--trace); padding: 20px; border-radius: 16px; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: space-between; color: var(--text-dark);
            box-shadow: 0 4px 0 var(--trace);
        }
        .btn-main:hover { border-color: var(--accent); transform: translateY(-2px); }

        .btn-topic { background: var(--mrveit); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; width: 100%; font-size: 1.1rem; }

        .story-box { background: #fffbeb; border-left: 5px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .history-container { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; padding: 15px; background: #fdfbf7; border-radius: 15px; border: 1px solid #eee; min-height: 100px; }
        
        .step-row { display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 1.6rem; padding: 10px; }
        .step-row.current { background: #fffbeb; border-radius: 10px; border: 2px solid var(--accent); }
        .step-row.old { opacity: 0.5; font-size: 1.2rem; border-bottom: 1px dashed var(--trace); }

        /* Draggable UI */
        .draggable { background: var(--accent); color: white; padding: 5px 12px; border-radius: 8px; cursor: grab; box-shadow: 0 3px 0 #b45309; }
        .drop-zone { width: 60px; height: 60px; border: 2px dashed #cbd5e1; border-radius: 8px; display: flex; justify-content: center; align-items: center; background: #f8fafc; font-size: 1rem; color: #94a3b8; }
        .btn-op { background: var(--danger); color: white; padding: 4px 12px; border-radius: 8px; cursor: pointer; border: none; font-size: 1.2rem; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        .feedback { font-weight: bold; padding: 10px; border-radius: 8px; margin-top: 5px; text-align: center; }
        .correct { background: #d1fae5; color: #065f46; }
        .wrong { background: #fee2e2; color: #991b1b; }

        .fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; }
        .num { border-bottom: 2px solid var(--text-dark); padding: 0 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="logo-container">
        <div class="teacher-tag">Profesor Mauricio</div>
        <h1 class="logo">Equilibria Pro</h1>
    </div>

    <div id="scr-welcome" class="screen active">
        <h3 style="text-align:center">¡Bienvenido! Comencemos tu práctica.</h3>
        <input type="text" id="user-name" placeholder="Escribe tu nombre y apellido">
        <button class="btn-topic" onclick="goToMenu()">Entrar</button>
    </div>

    <div id="scr-main-menu" class="screen">
        <h3 style="text-align:center">Selecciona un tema:</h3>
        <div class="menu-grid">
            <button class="btn-main" onclick="openTopic('ecuaciones')"><span>Ecuaciones</span> <span>🧮</span></button>
            <button class="btn-main" onclick="openTopic('valor-absoluto')"><span>Valor Absoluto</span> <span>|x|</span></button>
        </div>
    </div>

    <div id="scr-topic-menu" class="screen">
        <button onclick="showScreen('scr-main-menu')" style="border:none; background:none; color:var(--action-blue); cursor:pointer">← Volver</button>
        <h2 id="topic-title" style="text-align:center"></h2>
        <div class="menu-grid">
            <button class="btn-topic" onclick="startMode('aprende')">1. Aprendamos (Interactivo)</button>
            <button class="btn-topic" style="background:var(--action-blue)" onclick="startMode('practica')">2. Practiquemos (Paso a Paso)</button>
            <button class="btn-topic" style="background:var(--success)" onclick="startMode('evalua')">3. Evalúate (Test Final)</button>
        </div>
    </div>

    <div id="scr-aprende" class="screen">
        <div class="story-box" id="aprende-story"></div>
        <div id="tutorial-box" class="hidden" style="background:#e0f2fe; padding:15px; border-radius:10px; margin-bottom:15px"></div>
        <p id="aprende-instr" style="text-align:center; font-weight:bold; color:var(--mrveit)"></p>
        <div class="history-container" id="aprende-history"></div>
        <button id="btn-next-aprende" class="hidden" onclick="nextAprende()">Siguiente Ejercicio →</button>
    </div>

    <div id="scr-practica" class="screen">
        <div class="story-box" id="practica-story"></div>
        <div id="practica-history" class="history-container"></div>
        <div id="practica-input-zone">
            <p id="practica-prompt" style="font-weight:bold"></p>
            <input type="text" id="practica-input" placeholder="Escribe el siguiente paso...">
            <button class="btn-topic" onclick="checkPracticaStep()">Verificar</button>
            <div id="practica-feedback" class="feedback hidden"></div>
        </div>
        <button id="btn-next-practica" class="btn-topic hidden" onclick="nextPractica()">Siguiente Ejercicio →</button>
    </div>

    <div id="scr-evalua" class="screen">
        <h3 style="text-align:center">Evaluación Final</h3>
        <div id="evalua-container"></div>
        <button class="btn-topic" style="background:var(--success)" onclick="gradeEval()">Terminar y Reportar</button>
    </div>

    <div id="scr-report" class="screen">
        <h2 style="text-align:center">Tu Resultado</h2>
        <div id="report-content"></div>
        <button class="btn-topic" onclick="sendWA()">Enviar a Mr.Veit</button>
        <button class="btn-topic btn-secondary" style="background:#64748b" onclick="showScreen('scr-main-menu')">Cerrar</button>
    </div>
</div>

<script>
    let state = { name: "", topic: "", level: 0, currentEx: null, step: 0 };

    // --- GENERADOR DE NIVELES ECUACIONES ---
    function getExEcuacion(lvl) {
        const data = [
            { s:"Tenías x dulces, compraste 8. Ahora tienes 15.", q:"¿Cuántos tenías?", expr:"x + 8 = 15", steps:["x = 15 - 8", "7"], res:7, type:'simple', op:'+', inv:'-', r:8, target:15 },
            { s:"Tienes 4 cajas con x lápices cada una. En total hay 20.", q:"¿Cuántos hay por caja?", expr:"4x = 20", steps:["x = 20 / 4", "5"], res:5, type:'div', l:4, target:20 },
            { s:"El cuádruple de x más 8 es igual a 28.", q:"¿Cuál es el valor de x?", expr:"4x + 8 = 28", steps:["4x = 28 - 8", "4x = 20", "x = 20 / 4", "5"], res:5, type:'complejo', a:4, r:8, target:28 },
            { s:"Si divides x en 6 partes, obtienes 3.", q:"¿Cuál era el número original?", expr:"x / 6 = 3", steps:["x = 3 * 6", "18"], res:18, type:'mult', l:6, target:3 },
            { s:"La sexta parte de x más 5 es igual a 8.", q:"¿Cuánto vale x?", expr:"x / 6 + 5 = 8", steps:["x / 6 = 8 - 5", "x / 6 = 3", "x = 3 * 6", "18"], res:18, type:'complejo_div', l:6, r:5, target:8 }
        ];
        return data[lvl];
    }

    // --- GENERADOR DE NIVELES VALOR ABSOLUTO ---
    function getExAbs(lvl) {
        const data = [
            { s:"El valor absoluto representa la distancia al cero. ¿Qué números están a 5 unidades del 0?", q:"Ingresa uno de los valores.", expr:"|x| = 5", steps:["5", "-5"], res:5, tutorial:"El valor absoluto siempre es positivo porque es una distancia. |x|=5 significa que x puede ser 5 o -5." },
            { s:"Si la distancia de x al cero, más 2, es igual a 7.", q:"¿Cuál es el valor absoluto?", expr:"|x| + 2 = 7", steps:["|x| = 7 - 2", "5"], res:5 },
            { s:"La distancia entre x y el número 3 es 4.", q:"Calcula el valor positivo de x.", expr:"|x - 3| = 4", steps:["x - 3 = 4", "7"], res:7 },
            { s:"El doble del valor absoluto de x es 10.", q:"¿Cuál es el valor absoluto?", expr:"2|x| = 10", steps:["|x| = 10 / 2", "5"], res:5 },
            { s:"Dos veces la distancia de x al 1 es igual a 6.", q:"Calcula x (valor positivo).", expr:"2|x - 1| = 6", steps:["|x - 1| = 3", "x - 1 = 3", "4"], res:4 }
        ];
        return data[lvl];
    }

    // --- LÓGICA DE NAVEGACIÓN ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToMenu() {
        state.name = document.getElementById('user-name').value;
        if(!state.name) return alert("Ingresa tu nombre");
        showScreen('scr-main-menu');
    }

    function openTopic(t) {
        state.topic = t;
        document.getElementById('topic-title').innerText = t === 'ecuaciones' ? "Ecuaciones" : "Valor Absoluto";
        showScreen('scr-topic-menu');
    }

    function startMode(m) {
        state.level = 0;
        state.mode = m;
        if(m === 'aprende') loadAprende();
        else if(m === 'practica') loadPractica();
        else renderEval();
    }

    // --- MODO APRENDE (INTERACTIVO + RASTRO) ---
    function loadAprende() {
        state.currentEx = state.topic === 'ecuaciones' ? getExEcuacion(state.level) : getExAbs(state.level);
        state.subStep = 0;
        showScreen('scr-aprende');
        document.getElementById('aprende-history').innerHTML = "";
        document.getElementById('btn-next-aprende').classList.add('hidden');
        document.getElementById('aprende-story').innerHTML = `<strong>Nivel ${state.level+1}:</strong> ${state.currentEx.s}`;
        
        const tut = document.getElementById('tutorial-box');
        if(state.topic === 'valor-absoluto' && state.currentEx.tutorial) {
            tut.innerHTML = `💡 <strong>Concepto:</strong> ${state.currentEx.tutorial}`;
            tut.classList.remove('hidden');
        } else { tut.classList.add('hidden'); }

        renderAprendeUI();
    }

    function renderAprendeUI() {
        const ex = state.currentEx;
        const history = document.getElementById('aprende-history');
        const row = document.createElement('div');
        row.className = "step-row current";
        row.id = "active-step";

        if(state.topic === 'ecuaciones') {
            document.getElementById('aprende-instr').innerText = "Haz clic en el número o arrastra para mover.";
            if(ex.type === 'simple') {
                row.innerHTML = `<div>x</div><div>${ex.op}</div><div class="draggable" onclick="moveSimple()">${ex.r}</div><div>=</div><div>${ex.target}</div>`;
            } else if(ex.type === 'div') {
                row.innerHTML = `<div class="draggable" onclick="moveDiv()">${ex.l}</div><div>x</div><div>=</div><div>${ex.target}</div>`;
            } else if(ex.type === 'mult') {
                row.innerHTML = `<div class="fraction"><span class="num">x</span><span class="draggable" onclick="moveMult()">${ex.l}</span></div><div>=</div><div>${ex.target}</div>`;
            } else if(ex.type === 'complejo' || ex.type === 'complejo_div') {
                if(state.subStep === 0) {
                    row.innerHTML = `<div>${ex.expr.split('+')[0]}</div><div>+</div><div class="draggable" onclick="moveComplex1()">${ex.r}</div><div>=</div><div>${ex.target}</div>`;
                } else {
                    const tempVal = ex.target - ex.r;
                    if(ex.type === 'complejo') row.innerHTML = `<div class="draggable" onclick="moveComplex2(${tempVal})">${ex.a}</div><div>x</div><div>=</div><div>${tempVal}</div>`;
                    else row.innerHTML = `<div class="fraction"><span class="num">x</span><span class="draggable" onclick="moveComplex2(${tempVal})">${ex.l}</span></div><div>=</div><div>${tempVal}</div>`;
                }
            }
        } else {
            // Valor Absoluto: Guía por mensajes/clics
            document.getElementById('aprende-instr').innerText = "Toca el botón para resolver paso a paso.";
            row.innerHTML = `<div>${ex.expr}</div> <button class="btn-op" onclick="finishAprende()">Resolver</button>`;
        }
        history.appendChild(row);
    }

    // Funciones de movimiento
    function fixStep() { const s = document.getElementById('active-step'); s.id = ""; s.className = "step-row old"; }
    
    function moveSimple() {
        fixStep();
        const ex = state.currentEx;
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        row.innerHTML = `<div>x</div><div>=</div><div>${ex.target}</div><button class="btn-op" onclick="finishAprende()">${ex.inv}</button><div>${ex.r}</div>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function moveDiv() {
        fixStep();
        const ex = state.currentEx;
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        row.innerHTML = `<div>x</div><div>=</div><div class="fraction"><span class="num">${ex.target}</span><span>${ex.l}</span></div><button class="btn-op" onclick="finishAprende()">÷</button>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function moveMult() {
        fixStep();
        const ex = state.currentEx;
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        row.innerHTML = `<div>x</div><div>=</div><div>${ex.target}</div><button class="btn-op" onclick="finishAprende()">·</button><div>${ex.l}</div>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function moveComplex1() {
        fixStep();
        state.subStep = 1;
        const ex = state.currentEx;
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        row.innerHTML = `<div>${ex.expr.split('+')[0]}</div><div>=</div><div>${ex.target}</div><button class="btn-op" onclick="renderAprendeUI()">-</button><div>${ex.r}</div>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function moveComplex2(val) {
        fixStep();
        const ex = state.currentEx;
        const row = document.createElement('div'); row.className = "step-row current"; row.id = "active-step";
        if(ex.type === 'complejo') row.innerHTML = `<div>x</div><div>=</div><div class="fraction"><span class="num">${val}</span><span>${ex.a}</span></div><button class="btn-op" onclick="finishAprende()">÷</button>`;
        else row.innerHTML = `<div>x</div><div>=</div><div>${val}</div><button class="btn-op" onclick="finishAprende()">·</button><div>${ex.l}</div>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function finishAprende() {
        fixStep();
        const row = document.createElement('div'); row.className = "step-row current";
        row.innerHTML = `<div>Resultado: x =</div><div style="color:var(--success); font-weight:bold">${state.currentEx.res}</div>`;
        document.getElementById('aprende-history').appendChild(row);
        document.getElementById('btn-next-aprende').classList.remove('hidden');
    }

    function nextAprende() {
        state.level++;
        if(state.level < 5) loadAprende(); else showScreen('scr-topic-menu');
    }

    // --- MODO PRACTICA (PASO A PASO) ---
    function loadPractica() {
        state.currentEx = state.topic === 'ecuaciones' ? getExEcuacion(state.level) : getExAbs(state.level);
        state.step = 0;
        showScreen('scr-practica');
        document.getElementById('practica-history').innerHTML = `<div class="step-row current">${state.currentEx.expr}</div>`;
        document.getElementById('practica-story').innerText = state.currentEx.s;
        document.getElementById('practica-prompt').innerText = "Escribe el siguiente paso:";
        document.getElementById('btn-next-practica').classList.add('hidden');
        document.getElementById('practica-input-zone').classList.remove('hidden');
    }

    function checkPracticaStep() {
        const val = document.getElementById('practica-input').value.replace(/\s/g, '').toLowerCase();
        const correct = state.currentEx.steps[state.step].replace(/\s/g, '').toLowerCase();
        const feed = document.getElementById('practica-feedback');

        if(val === correct || (state.step === state.currentEx.steps.length-1 && parseInt(val) === state.currentEx.res)) {
            feed.innerText = "¡Correcto!"; feed.className = "feedback correct"; feed.classList.remove('hidden');
            const hist = document.getElementById('practica-history');
            hist.lastChild.className = "step-row old";
            const row = document.createElement('div'); row.className = "step-row current";
            row.innerText = state.currentEx.steps[state.step];
            hist.appendChild(row);
            state.step++;
            document.getElementById('practica-input').value = "";
            if(state.step >= state.currentEx.steps.length) {
                document.getElementById('practica-input-zone').classList.add('hidden');
                document.getElementById('btn-next-practica').classList.remove('hidden');
            }
        } else {
            feed.innerText = "Inténtalo de nuevo."; feed.className = "feedback wrong"; feed.classList.remove('hidden');
        }
    }

    function nextPractica() {
        state.level++;
        if(state.level < 5) loadPractica(); else showScreen('scr-topic-menu');
    }

    // --- EVALUACIÓN ---
    function renderEval() {
        showScreen('scr-evalua');
        const cont = document.getElementById('evalua-container');
        cont.innerHTML = ""; state.quiz = [];
        for(let i=0; i<5; i++) {
            const ex = state.topic === 'ecuaciones' ? getExEcuacion(i) : getExAbs(i);
            state.quiz.push(ex);
            cont.innerHTML += `<div class="story-box" style="background:white"><strong>Nivel ${i+1}:</strong> ${ex.s}<br>Ecuación: ${ex.expr}<br><input type="number" id="ev-${i}" placeholder="Valor de x"></div>`;
        }
    }

    function gradeEval() {
        let nota = 0;
        state.quiz.forEach((ex, i) => { if(parseInt(document.getElementById(`ev-${i}`).value) === ex.res) nota++; });
        state.finalNota = nota;
        document.getElementById('report-content').innerHTML = `<h1 style="font-size:4rem">${nota}/5</h1><p>¡Buen trabajo, ${state.name}!</p>`;
        showScreen('scr-report');
    }

    function sendWA() {
        const msg = `*REPORTE EQUILIBRIA*\nEstudiante: ${state.name}\nTema: ${state.topic}\nNota: ${state.finalNota}/5`;
        window.open(`https://wa.me/56961410052?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
