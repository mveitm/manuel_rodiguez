<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.Veit - Equilibria Pro V2</title>
    <style>
        :root {
            --bg-warm: #fffdfa;
            --paper: #ffffff;
            --text-dark: #451a03;
            --mrveit: #d97706;
            --accent: #f59e0b;
            --success: #059669;
            --action-blue: #3b82f6;
            --trace: #e2e8f0;
            --danger: #ef4444;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-warm); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-dark); }
        #app { background: var(--paper); width: 95%; max-width: 650px; margin: 20px; border-radius: 24px; box-shadow: 0 15px 35px rgba(69, 26, 3, 0.1); padding: 25px; border: 4px solid var(--mrveit); display: flex; flex-direction: column; }
        
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--mrveit); margin: 0; }
        .teacher-tag { font-size: 0.9rem; color: #92400e; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }

        .menu-grid { display: grid; gap: 15px; margin-top: 20px; }
        .btn-main { 
            background: white; border: 2px solid var(--trace); padding: 20px; border-radius: 16px; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: space-between; color: var(--text-dark);
            box-shadow: 0 4px 0 var(--trace);
        }
        .btn-main:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 0 var(--trace); }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 0 0 var(--trace); }

        .btn-topic { 
            background: var(--mrveit); color: white; border: none; padding: 18px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
            width: 100%; font-size: 1.1rem;
        }

        .story-box { background: #fffbeb; border-left: 5px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .history-container { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; padding: 15px; background: #fdfbf7; border-radius: 15px; border: 1px solid #eee; }
        
        .step-row { display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 1.6rem; padding: 10px; border-bottom: 1px dashed var(--trace); }
        .step-row.current { border-bottom: none; background: #fffbeb; border-radius: 10px; border: 2px solid var(--accent); }
        .step-row.old { opacity: 0.5; font-size: 1.2rem; }

        /* Estilos Interactivos */
        .draggable { background: var(--accent); color: white; padding: 5px 12px; border-radius: 8px; cursor: grab; }
        .drop-zone { width: 60px; height: 60px; border: 2px dashed #cbd5e1; border-radius: 8px; display: flex; justify-content: center; align-items: center; background: #f8fafc; }
        .btn-op { background: var(--danger); color: white; padding: 4px 12px; border-radius: 8px; cursor: pointer; }
        .fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; }
        .num { border-bottom: 2px solid var(--text-dark); padding: 0 5px; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .feedback { font-weight: bold; padding: 10px; border-radius: 8px; margin-top: 5px; text-align: center; }
        .correct { background: #d1fae5; color: #065f46; }
        .wrong { background: #fee2e2; color: #991b1b; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="logo-container">
        <div class="teacher-tag">Profesor Mauricio</div>
        <h1 class="logo">Equilibria Pro</h1>
    </div>

    <div id="scr-welcome" class="screen active">
        <h3 style="text-align:center">¡Bienvenido! Comencemos tu aventura matemática.</h3>
        <input type="text" id="user-name" placeholder="Escribe tu nombre y apellido">
        <button class="btn-topic" onclick="goToMenu()">Entrar</button>
    </div>

    <div id="scr-main-menu" class="screen">
        <h3 style="text-align:center">¿Qué quieres estudiar hoy?</h3>
        <div class="menu-grid">
            <button class="btn-main" onclick="openTopic('ecuaciones')"><span>Ecuaciones</span> <span>🧮</span></button>
            <button class="btn-main" onclick="openTopic('valor-absoluto')"><span>Valor Absoluto</span> <span>|x|</span></button>
        </div>
    </div>

    <div id="scr-topic-menu" class="screen">
        <button onclick="showScreen('scr-main-menu')" style="border:none; background:none; color:var(--action-blue); cursor:pointer">← Volver</button>
        <h2 id="topic-title" style="text-align:center"></h2>
        <div class="menu-grid">
            <button class="btn-topic" onclick="startMode('aprende')">1. Aprendamos (Guía Interactiva)</button>
            <button class="btn-topic" style="background:var(--action-blue)" onclick="startMode('practica')">2. Practiquemos (Sin Drag & Drop)</button>
            <button class="btn-topic" style="background:var(--success)" onclick="startMode('evalua')">3. Evalúate (Test Final)</button>
        </div>
    </div>

    <div id="scr-aprende" class="screen">
        <div class="story-box" id="aprende-story"></div>
        <p id="aprende-instr" style="text-align:center; font-weight:bold; color:var(--mrveit)"></p>
        <div class="history-container" id="aprende-history"></div>
        <button id="btn-next-aprende" class="hidden" onclick="nextAprende()">Siguiente Ejercicio →</button>
    </div>

    <div id="scr-practica" class="screen">
        <div class="story-box" id="practica-story"></div>
        <div id="practica-history" class="history-container"></div>
        <div id="practica-input-zone">
            <p id="practica-prompt" style="font-weight:bold"></p>
            <input type="text" id="practica-input" placeholder="Escribe el siguiente paso...">
            <button class="btn-topic" onclick="checkPracticaStep()">Verificar Paso</button>
            <div id="practica-feedback" class="feedback hidden"></div>
        </div>
        <button id="btn-next-practica" class="btn-topic hidden" onclick="nextPractica()">Siguiente Ejercicio →</button>
    </div>

    <div id="scr-evalua" class="screen">
        <h3 style="text-align:center">Evaluación Final</h3>
        <div class="story-box" style="background:#e0f2fe; border-left-color:var(--action-blue)">
            <strong>Instrucciones:</strong> Resuelve los 5 ejercicios en tu cuaderno. Escribe solo el valor numérico de "x" en cada casilla.
        </div>
        <div id="evalua-container"></div>
        <button class="btn-topic" style="background:var(--success)" onclick="gradeEval()">Terminar y Ver Reporte</button>
    </div>

    <div id="scr-report" class="screen">
        <h2 style="text-align:center">Reporte de Desempeño</h2>
        <div id="report-content"></div>
        <button class="btn-topic" onclick="sendWA()">Enviar a Mr.Veit por WhatsApp</button>
        <button class="btn-topic btn-secondary" style="background:#64748b" onclick="showScreen('scr-main-menu')">Cerrar</button>
    </div>
</div>

<script>
    let state = { name: "", topic: "", level: 0, currentEx: null, quizResults: [] };

    // --- GENERACIÓN DE NIVELES (SEGÚN ARCHIVO COMPARTIDO) ---
    function genEx(level) {
        const x = Math.floor(Math.random() * 5) + 3;
        const b = Math.floor(Math.random() * 7) + 2;
        const a = Math.floor(Math.random() * 3) + 2;

        switch(level) {
            case 0: return { s:`Tenías x cartas, te dieron ${b}. Ahora tienes ${x+b}.`, q:"¿Cuántas tenías?", expr:`x + ${b} = ${x+b}`, steps:[`x = ${x+b} - ${b}`, `${x}`], res:x, type:'simple', op:'+', inv:'-', r:b, target:x+b };
            case 1: return { s:`Había x aves, volaron ${b} y quedaron ${x}.`, q:"¿Cuántas había?", expr:`x - ${b} = ${x}`, steps:[`x = ${x} + ${b}`, `${x+b}`], res:x+b, type:'simple', op:'-', inv:'+', r:b, target:x };
            case 2: return { s:`Hay ${a} grupos con x niños. Total: ${a*x}.`, q:"¿Niños por grupo?", expr:`${a}x = ${a*x}`, steps:[`x = ${a*x} / ${a}`, `${x}`], res:x, type:'div', l:a, target:a*x };
            case 3: return { s:`El doble de un número (${a}x) más ${b} es ${a*x+b}.`, q:"¿Cuál es x?", expr:`${a}x + ${b} = ${a*x+b}`, steps:[`${a}x = ${a*x}`, `x = ${a*x} / ${a}`, `${x}`], res:x, type:'complejo', a_val:a, r:b, target:a*x+b };
            case 4: return { s:`Repartes x dulces entre ${a} amigos y tocan a ${x} cada uno.`, q:"¿Total dulces?", expr:`x / ${a} = ${x}`, steps:[`x = ${x} * ${a}`, `${a*x}`], res:a*x, type:'simple', op:'/', inv:'*', r:a, target:x };
        }
    }

    // --- NAVEGACIÓN ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToMenu() {
        state.name = document.getElementById('user-name').value;
        if(!state.name) return alert("Ingresa tu nombre");
        showScreen('scr-main-menu');
    }

    function openTopic(t) {
        state.topic = t;
        document.getElementById('topic-title').innerText = t === 'ecuaciones' ? "Ecuaciones" : "Valor Absoluto";
        showScreen('scr-topic-menu');
    }

    function startMode(m) {
        state.level = 0;
        if(m === 'aprende') loadAprende();
        else if(m === 'practica') loadPractica();
        else renderEval();
    }

    // --- MODO 1: APRENDE (KINÉTICO CON RASTRO) ---
    function loadAprende() {
        state.currentEx = genEx(state.level);
        showScreen('scr-aprende');
        document.getElementById('aprende-history').innerHTML = "";
        document.getElementById('btn-next-aprende').classList.add('hidden');
        document.getElementById('aprende-story').innerHTML = `<strong>Nivel ${state.level+1}:</strong> ${state.currentEx.s}<br>${state.currentEx.q}`;
        renderAprendeRow();
    }

    function renderAprendeRow() {
        const row = document.createElement('div');
        row.className = "step-row current"; row.id = "active-aprende";
        const ex = state.currentEx;
        
        if(ex.type === 'simple') {
            document.getElementById('aprende-instr').innerText = "Arrastra el número para despejar x.";
            row.innerHTML = `<div>x</div><div>${ex.op}</div><div class="draggable" draggable="true" ondragstart="drag(e)">${ex.r}</div><div>=</div><div>${ex.target}</div><div class="drop-zone" ondrop="dropAprende(event)" ondragover="allow(event)">?</div>`;
        } else {
            row.innerHTML = `<div>${ex.expr}</div><button class="btn-op" onclick="finishAprende()">Resolver</button>`;
        }
        document.getElementById('aprende-history').appendChild(row);
    }

    function dropAprende(e) {
        e.preventDefault();
        const old = document.getElementById('active-aprende');
        old.id = ""; old.className = "step-row old";
        const row = document.createElement('div');
        row.className = "step-row current"; row.id = "active-aprende";
        row.innerHTML = `<div>x</div><div>=</div><div>${state.currentEx.target}</div><div class="btn-op" onclick="finishAprende()">${state.currentEx.inv}</div><div>${state.currentEx.r}</div>`;
        document.getElementById('aprende-history').appendChild(row);
    }

    function finishAprende() {
        const old = document.getElementById('active-aprende');
        old.id = ""; old.className = "step-row old";
        const row = document.createElement('div');
        row.className = "step-row current";
        row.innerHTML = `<div>x</div><div>=</div><div style="color:var(--success)">${state.currentEx.res}</div>`;
        document.getElementById('aprende-history').appendChild(row);
        document.getElementById('btn-next-aprende').classList.remove('hidden');
    }

    function nextAprende() {
        state.level++;
        if(state.level < 5) loadAprende(); else showScreen('scr-topic-menu');
    }

    // --- MODO 2: PRACTICA (PASO A PASO ASISTIDO) ---
    let practicaStep = 0;
    function loadPractica() {
        state.currentEx = genEx(state.level);
        practicaStep = 0;
        showScreen('scr-practica');
        document.getElementById('practica-history').innerHTML = `<div class="step-row current">${state.currentEx.expr}</div>`;
        document.getElementById('practica-story').innerText = state.currentEx.s;
        document.getElementById('practica-prompt').innerText = "Escribe el siguiente paso de la ecuación:";
        document.getElementById('btn-next-practica').classList.add('hidden');
        document.getElementById('practica-input-zone').classList.remove('hidden');
    }

    function checkPracticaStep() {
        const input = document.getElementById('practica-input');
        const feedback = document.getElementById('practica-feedback');
        const correctStep = state.currentEx.steps[practicaStep].replace(/\s/g, '');
        const userStep = input.value.replace(/\s/g, '');

        if(userStep === correctStep) {
            feedback.innerText = "¡Correcto! Muy bien.";
            feedback.className = "feedback correct";
            feedback.classList.remove('hidden');
            
            // Mover al historial
            const hist = document.getElementById('practica-history');
            hist.lastChild.className = "step-row old";
            const row = document.createElement('div');
            row.className = "step-row current";
            row.innerText = state.currentEx.steps[practicaStep];
            hist.appendChild(row);

            practicaStep++;
            input.value = "";
            
            if(practicaStep >= state.currentEx.steps.length) {
                document.getElementById('practica-input-zone').classList.add('hidden');
                document.getElementById('btn-next-practica').classList.remove('hidden');
            }
        } else {
            feedback.innerText = "Casi... Revisa bien la operación.";
            feedback.className = "feedback wrong";
            feedback.classList.remove('hidden');
        }
    }

    function nextPractica() {
        state.level++;
        if(state.level < 5) loadPractica(); else showScreen('scr-topic-menu');
    }

    // --- MODO 3: EVALÚA ---
    function renderEval() {
        showScreen('scr-evalua');
        const container = document.getElementById('evalua-container');
        container.innerHTML = "";
        state.quizPool = [];
        for(let i=0; i<5; i++) {
            const ex = genEx(i);
            state.quizPool.push(ex);
            container.innerHTML += `
                <div class="story-box" style="background:white">
                    <p><strong>Nivel ${i+1}:</strong> ${ex.s}</p>
                    <p>Ecuación: ${ex.expr}</p>
                    <input type="number" id="eval-${i}" placeholder="x = ?">
                </div>`;
        }
    }

    function gradeEval() {
        let nota = 0;
        let reporteHTML = "";
        state.quizPool.forEach((ex, i) => {
            const val = document.getElementById(`eval-${i}`).value;
            const isCorrect = parseInt(val) === ex.res;
            if(isCorrect) nota++;
            reporteHTML += `
                <div style="border-bottom:1px solid #eee; padding:10px">
                    <strong>Nivel ${i+1}:</strong> ${isCorrect ? '✅' : '❌'}<br>
                    Respuesta correcta: x = ${ex.res}
                </div>`;
        });
        state.finalNota = nota;
        document.getElementById('report-content').innerHTML = `<h3>Nota: ${nota}/5</h3>` + reporteHTML;
        showScreen('scr-report');
    }

    function sendWA() {
        const msg = `*REPORTE EQUILIBRIA*\nEstudiante: ${state.name}\nNota Final: ${state.finalNota}/5`;
        window.open(`https://wa.me/56961410052?text=${encodeURIComponent(msg)}`);
    }

    function drag(e) { e.dataTransfer.setData("text", "drag"); }
    function allow(e) { e.preventDefault(); }
</script>

</body>
</html>
