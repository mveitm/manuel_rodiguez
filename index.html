<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.Veit - Equilibria Pro</title>
    <style>
        :root {
            --bg-warm: #fff9f2;
            --paper: #ffffff;
            --text-dark: #451a03;
            --mrveit: #d97706; /* Ámbar cálido */
            --accent: #f59e0b;
            --success: #059669;
            --soft-red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-warm);
            background-image: radial-gradient(#e7d8c9 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        #app {
            background: var(--paper);
            width: 95%;
            max-width: 600px;
            margin: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(69, 26, 3, 0.1);
            padding: 25px;
            border: 4px solid var(--mrveit);
            position: relative;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--mrveit);
            text-align: center;
            margin-bottom: 5px;
        }

        .screen { display: none; }
        .active { display: block; }

        .story-box {
            background: #fffbeb;
            border-left: 5px solid var(--accent);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .instruction {
            text-align: center;
            font-weight: bold;
            color: var(--mrveit);
            margin-bottom: 10px;
            min-height: 1.2em;
        }

        .board {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            height: 100px;
            font-size: 2.2rem;
            background: #fffcf0;
            border-radius: 15px;
            border: 2px solid #f3e8d2;
            margin: 20px 0;
        }

        .draggable {
            background: var(--accent);
            color: white;
            padding: 5px 12px;
            border-radius: 10px;
            cursor: grab;
            box-shadow: 0 4px 0 #b45309;
        }

        .drop-zone {
            width: 70px;
            height: 70px;
            border: 3px dashed #d6d3d1;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafaf9;
        }

        .btn-op {
            background: var(--soft-red);
            color: white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.3rem;
            box-shadow: 0 3px 0 #991b1b;
        }

        .quiz-card {
            background: #fffcf0;
            border: 1px solid #e7e5e4;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 2px solid #d6d3d1;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--mrveit);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s;
        }

        button:active { transform: translateY(2px); }

        .wa-btn { background: #16a34a; }
        .retry-btn { background: #78350f; margin-top: 5px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="logo">Mr.Veit</div>

    <div id="scr-start" class="screen active">
        <h3 style="text-align:center">¡Hola! Vamos a jugar con Ecuaciones</h3>
        <p style="text-align:center">Aprende paso a paso y diviértete.</p>
        <input type="text" id="nombre" placeholder="Escribe tu Nombre">
        <input type="text" id="apellido" placeholder="Escribe tu Apellido">
        <input type="text" id="curso" placeholder="Escribe tu Curso">
        <button onclick="iniciar()">Empezar Aventura</button>
    </div>

    <div id="scr-learn" class="screen">
        <div class="story-box" id="learn-story"></div>
        <div class="instruction" id="learn-instr"></div>
        <div class="board" id="learn-board"></div>
    </div>

    <div id="scr-quiz" class="screen">
        <h3>🎯 Tu Turno</h3>
        <p>Resuelve estos 5 ejercicios en tu cuaderno y anota el resultado de la X.</p>
        <div id="quiz-list"></div>
        <button onclick="evaluarQuiz()">Terminar y calificar</button>
    </div>

    <div id="scr-results" class="screen" style="text-align:center">
        <h2 id="res-title"></h2>
        <div id="res-score" style="font-size: 3rem; font-weight: bold; margin: 20px 0;"></div>
        <p id="res-msg"></p>
        <button class="wa-btn" onclick="enviarWA()">Enviar reporte a Mr.Veit</button>
        <button class="retry-btn" onclick="reiniciar()">Jugar con otros números</button>
    </div>
</div>

<script>
    let userData = {};
    let curLvl = 0;
    let step = 1; 
    let currentData = {};
    let quizItems = [];

    // Generador de números aleatorios que aseguren enteros
    function genData(lvl) {
        let a = Math.floor(Math.random() * 8) + 2;
        let x = Math.floor(Math.random() * 9) + 2;
        let b = Math.floor(Math.random() * 15) + 5;
        
        switch(lvl) {
            case 0: return { s: `Tenías x monedas, encontraste ${b} más y ahora tienes ${x+b}.`, l:'x', op:'+', r:b, target:x+b, inv:'-', res:x };
            case 1: return { s: `Un bus lleva x personas, bajan ${a} y quedan ${b}.`, l:'x', op:'-', r:a, target:b, inv:'+', res:a+b };
            case 2: return { s: `Compraste ${a} helados iguales por $${a*x}. ¿Cuánto costó cada uno?`, l:a, op:'·', r:'x', target:a*x, inv:'÷', res:x };
            case 3: return { s: `Repartiste x galletas entre ${a} amigos y a cada uno le tocaron ${x}.`, l:'x', op:'÷', r:a, target:x, inv:'·', res:a*x };
            case 4: return { s: `El doble de tu edad (${a}x) más ${b} años da ${a*x+b}.`, l:a+'x', op:'+', r:b, target:a*x+b, inv:'-', res:x };
        }
    }

    function iniciar() {
        userData.n = document.getElementById('nombre').value;
        userData.a = document.getElementById('apellido').value;
        userData.c = document.getElementById('curso').value;
        if(!userData.n) return alert("Por favor escribe tu nombre");
        curLvl = 0;
        showScreen('scr-learn');
        loadLearn();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- APRENDIZAJE ---
    function loadLearn() {
        currentData = genData(curLvl);
        step = 1;
        document.getElementById('learn-story').innerText = currentData.s;
        document.getElementById('learn-instr').innerText = `Paso 1: Arrastra el ${currentData.op}${currentData.r} al otro lado.`;
        
        const board = document.getElementById('learn-board');
        board.innerHTML = `
            <div>${currentData.l === 'x' ? 'x' : currentData.l}</div>
            <div>${currentData.op}</div>
            <div id="drag-item" class="draggable" draggable="true" ondragstart="drag(event)">${currentData.l === 'x' ? currentData.r : ''}</div>
            <div>=</div>
            <div>${currentData.target}</div>
            <div class="drop-zone" ondrop="drop(event)" ondragover="allow(event)">?</div>
        `;
        // Ajuste para nivel 3 (multiplicación ax=b)
        if(currentData.op === '·') {
            board.innerHTML = `
                <div id="drag-item" class="draggable" draggable="true" ondragstart="drag(event)">${currentData.l}</div>
                <div>·</div><div>x</div><div>=</div><div>${currentData.target}</div>
                <div class="drop-zone" ondrop="drop(event)" ondragover="allow(event)">?</div>
            `;
        }
    }

    function drag(e) { e.dataTransfer.setData("text", e.target.id); }
    function allow(e) { e.preventDefault(); }
    function drop(e) {
        e.preventDefault();
        const board = document.getElementById('learn-board');
        board.innerHTML = `
            <div>x</div><div>=</div><div>${currentData.target}</div>
            <div class="btn-op" onclick="resolverStep()">${currentData.inv}</div>
            <div>${currentData.r === 'x' ? currentData.l : currentData.r}</div>
        `;
        document.getElementById('learn-instr').innerText = `¡Excelente! Ahora toca el signo "${currentData.inv}" para calcular.`;
        step = 2;
    }

    function resolverStep() {
        document.getElementById('learn-board').innerHTML = `<div>x</div><div>=</div><div style="color:var(--success)">${currentData.res}</div>`;
        document.getElementById('learn-instr').innerText = "¡Muy bien! ¡Lo lograste!";
        setTimeout(() => {
            curLvl++;
            if(curLvl < 5) loadLearn();
            else startQuiz();
        }, 2000);
    }

    // --- QUIZ ---
    function startQuiz() {
        showScreen('scr-quiz');
        const list = document.getElementById('quiz-list');
        list.innerHTML = "";
        quizItems = [];
        for(let i=0; i<5; i++) {
            let d = genData(i);
            quizItems.push(d);
            list.innerHTML += `
                <div class="quiz-card">
                    <b>Ecuación ${i+1}:</b> ${d.l} ${d.op} ${d.r} = ${d.target}
                    <input type="number" id="q-${i}" placeholder="Resultado de x">
                </div>
            `;
        }
    }

    function evaluarQuiz() {
        let nota = 0;
        quizItems.forEach((d, i) => {
            if(parseInt(document.getElementById(`q-${i}`).value) === d.res) nota++;
        });

        userData.nota = nota;
        document.getElementById('res-score').innerText = nota + " / 5";
        document.getElementById('res-title').innerText = nota >= 4 ? "¡Eres una estrella! 🌟" : "¡Buen esfuerzo! 💪";
        document.getElementById('res-msg').innerText = nota >= 4 ? 
            "Dominas las ecuaciones perfectamente. ¡Felicidades!" : 
            "Casi lo tienes. Si practicas una vez más, serás un experto.";
        
        showScreen('scr-results');
    }

    function enviarWA() {
        const msg = `*MR. VEIT - REPORTE*\n👤 Estudiante: ${userData.n} ${userData.a}\n📚 Curso: ${userData.c}\n✅ Puntaje: ${userData.nota} de 5 correctas.`;
        window.open(`https://wa.me/56961410052?text=${encodeURIComponent(msg)}`);
    }

    function reiniciar() {
        document.getElementById('nombre').value = userData.n;
        document.getElementById('apellido').value = userData.a;
        document.getElementById('curso').value = userData.c;
        iniciar();
    }
</script>
</body>
</html>
