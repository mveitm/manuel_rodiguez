  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.Veit - Equilibria Pro (Control de Ritmo)</title>
    <style>
        :root {
            --bg-warm: #fff9f2;
            --paper: #ffffff;
            --text-dark: #451a03;
            --mrveit: #d97706;
            --accent: #f59e0b;
            --success: #059669;
            --soft-red: #ef4444;
            --action-blue: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-warm);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        #app {
            background: var(--paper);
            width: 95%;
            max-width: 600px;
            margin: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(69, 26, 3, 0.1);
            padding: 25px;
            border: 4px solid var(--mrveit);
        }

        .logo { font-size: 2.2rem; font-weight: 900; color: var(--mrveit); text-align: center; margin-bottom: 5px; }
        .screen { display: none; }
        .active { display: block; }
        .story-box { background: #fffbeb; border-left: 5px solid var(--accent); padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 1.1rem; }
        .instruction { text-align: center; font-weight: bold; color: var(--mrveit); margin-bottom: 10px; min-height: 1.2em; }
        
        .board {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            height: 120px;
            font-size: 2.2rem;
            background: #fffcf0;
            border-radius: 15px;
            border: 2px solid #f3e8d2;
            margin: 20px 0;
        }

        .draggable {
            background: var(--accent);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: grab;
            box-shadow: 0 4px 0 #b45309;
        }

        .drop-zone {
            width: 80px;
            height: 80px;
            border: 3px dashed #d6d3d1;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafaf9;
        }

        .btn-op {
            background: var(--soft-red);
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 3px 0 #991b1b;
        }

        button { width: 100%; padding: 16px; background: var(--mrveit); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .next-btn { background: var(--action-blue); margin-top: 20px; border-bottom: 4px solid #1d4ed8; }
        .wa-btn { background: #16a34a; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="logo">Mr.Veit</div>

    <div id="scr-start" class="screen active">
        <h3 style="text-align:center">¡Hola! Vamos a jugar con Ecuaciones</h3>
        <input type="text" id="nombre" placeholder="Tu Nombre">
        <button onclick="iniciar()">Empezar Aventura</button>
    </div>

    <div id="scr-learn" class="screen">
        <div class="story-box" id="learn-story"></div>
        <div class="instruction" id="learn-instr"></div>
        <div class="board" id="learn-board"></div>
        <button id="btn-next-lvl" class="next-btn hidden" onclick="avanzarNivel()">Siguiente Ejercicio →</button>
    </div>

    <div id="scr-quiz" class="screen">
        <h3>🎯 Tu Turno (En el Cuaderno)</h3>
        <div id="quiz-list"></div>
        <button onclick="evaluarQuiz()">Terminar y calificar</button>
    </div>

    <div id="scr-results" class="screen" style="text-align:center">
        <h2 id="res-title"></h2>
        <div id="res-score" style="font-size: 3rem; font-weight: bold; margin: 20px 0;"></div>
        <button class="wa-btn" onclick="enviarWA()">Enviar reporte a Mr.Veit</button>
        <button onclick="reiniciar()">Jugar de nuevo</button>
    </div>
</div>

<script>
    let userData = {};
    let curLvl = 0;
    let currentData = {};

    function genData(lvl) {
        let a = Math.floor(Math.random() * 5) + 2; 
        let x = Math.floor(Math.random() * 8) + 2; 
        let b = Math.floor(Math.random() * 10) + 2; 
        
        switch(lvl) {
            case 0: return { s: `Tenías x dulces, compraste ${b} más y ahora tienes ${x+b}.`, l:'x', op:'+', r:b, target:x+b, inv:'-', res:x };
            case 1: return { s: `En un bus x personas, bajan ${b} y quedan ${x}.`, l:'x', op:'-', r:b, target:x, inv:'+', res:x+b };
            case 2: return { s: `Tienes ${a} cajas iguales con x lápices. En total hay ${a*x}.`, l:a, op:'·', r:'x', target:a*x, inv:'÷', res:x };
            case 3: return { s: `Repartes x chocolates entre ${a} amigos y a cada uno le tocan ${x}.`, l:'x', op:'÷', r:a, target:x, inv:'·', res:a*x };
            case 4: return { s: `El triple de un número (${a}x) más ${b} da como resultado ${a*x+b}.`, l:a+'x', op:'+', r:b, target:a*x+b, inv:'-', res:x };
        }
    }

    function iniciar() {
        userData.n = document.getElementById('nombre').value;
        if(!userData.n) return alert("Escribe tu nombre");
        curLvl = 0;
        showScreen('scr-learn');
        loadLearn();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function loadLearn() {
        currentData = genData(curLvl);
        document.getElementById('btn-next-lvl').classList.add('hidden'); // Escondemos botón hasta terminar
        document.getElementById('learn-story').innerText = currentData.s;
        document.getElementById('learn-instr').innerText = `Arrastra el ${currentData.r} al otro lado del signo igual.`;
        
        const board = document.getElementById('learn-board');
        if(currentData.op === '·') {
            board.innerHTML = `
                <div id="drag-item" class="draggable" draggable="true" ondragstart="drag(event)">${currentData.l}</div>
                <div>·</div><div>x</div><div>=</div><div>${currentData.target}</div>
                <div class="drop-zone" ondrop="drop(event)" ondragover="allow(event)">?</div>
            `;
        } else {
            board.innerHTML = `
                <div>${currentData.l}</div><div>${currentData.op}</div>
                <div id="drag-item" class="draggable" draggable="true" ondragstart="drag(event)">${currentData.r}</div>
                <div>=</div><div>${currentData.target}</div>
                <div class="drop-zone" ondrop="drop(event)" ondragover="allow(event)">?</div>
            `;
        }
    }

    function drag(e) { e.dataTransfer.setData("text", e.target.id); }
    function allow(e) { e.preventDefault(); }
    
    function drop(e) {
        e.preventDefault();
        const board = document.getElementById('learn-board');
        let termAMover = (currentData.op === '·') ? currentData.l : currentData.r;
        
        board.innerHTML = `
            <div>${currentData.op === '·' ? 'x' : currentData.l}</div><div>=</div><div>${currentData.target}</div>
            <div class="btn-op" onclick="resolverStep()">${currentData.inv}</div>
            <div>${termAMover}</div>
        `;
        document.getElementById('learn-instr').innerText = `¡Bien hecho! Ahora toca el signo "${currentData.inv}" para ver el resultado.`;
    }

    function resolverStep() {
        document.getElementById('learn-board').innerHTML = `<div>x</div><div>=</div><div style="color:var(--success)">${currentData.res}</div>`;
        document.getElementById('learn-instr').innerText = "¡Excelente! Has resuelto la ecuación.";
        
        // MOSTRAR BOTÓN SIGUIENTE EN LUGAR DE PASAR AUTOMÁTICO
        document.getElementById('btn-next-lvl').classList.remove('hidden');
    }

    function avanzarNivel() {
        curLvl++;
        if(curLvl < 5) loadLearn();
        else startQuiz();
    }

    function startQuiz() {
        showScreen('scr-quiz');
        const list = document.getElementById('quiz-list');
        list.innerHTML = "";
        window.quizActual = [];
        for(let i=0; i<5; i++) {
            let d = genData(i);
            window.quizActual.push(d);
            list.innerHTML += `<div class="story-box" style="background:white">${d.l} ${d.op} ${d.r} = ${d.target} <br> <input type="number" id="q-${i}" placeholder="Escribe el valor de x"></div>`;
        }
    }

    function evaluarQuiz() {
        let nota = 0;
        window.quizActual.forEach((d, i) => {
            if(parseInt(document.getElementById(`q-${i}`).value) === d.res) nota++;
        });
        userData.nota = nota;
        document.getElementById('res-score').innerText = nota + " / 5";
        document.getElementById('res-title').innerText = nota >= 4 ? "¡Eres un genio! 🌟" : "¡Sigue así! 💪";
        showScreen('scr-results');
    }

    function enviarWA() {
        const msg = `*MR. VEIT - REPORTE*\nEstudiante: ${userData.n}\nLogro: ${userData.nota} correctas.`;
        window.open(`https://wa.me/56961410052?text=${encodeURIComponent(msg)}`);
    }

    function reiniciar() { iniciar(); }
</script>
</body>
</html>
