<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesor Mauricio - Aprende Matemáticas</title>
    <style>
        :root {
            --primary-blue: #1e40af; 
            --action-cyan: #06b6d4;  
            --attention-yellow: #facc15; 
            --highlight-orange: #f97316; 
            --bg-light: #f8fafc;
            --text-dark: #0f172a;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-dark); }
        #app { background: var(--white); width: 95%; max-width: 650px; margin: 20px; border-radius: 24px; box-shadow: 0 20px 40px rgba(30, 64, 175, 0.1); padding: 25px; border-top: 8px solid var(--primary-blue); position: relative; }
        
        .btn-back { position: absolute; top: 15px; left: 15px; background: none; border: none; color: var(--primary-blue); cursor: pointer; font-weight: bold; }
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary-blue); margin: 0; line-height: 1.2; }

        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        .btn-main { background: var(--primary-blue); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; margin-bottom: 12px; transition: 0.2s; border-bottom: 4px solid #1e3a8a; }
        .btn-main:hover { background: #1d4ed8; transform: translateY(-2px); }
        
        .btn-alt { background: var(--white); color: var(--text-dark); border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; text-align: left; }
        .btn-alt:hover { border-color: var(--action-cyan); background: #ecfeff; }

        .story-box { background: #eff6ff; border-left: 5px solid var(--action-cyan); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .history-container { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; padding: 15px; background: #f1f5f9; border-radius: 18px; border: 1px solid #e2e8f0; }
        
        .step-row { display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 1.6rem; padding: 10px; font-weight: 600; }
        .step-row.current { background: var(--attention-yellow); border-radius: 12px; color: var(--primary-blue); }
        .step-row.old { opacity: 0.4; font-size: 1.2rem; }

        .highlight-box { background: var(--highlight-orange); color: white; padding: 4px 12px; border-radius: 8px; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 1rem; }
        .feedback { font-weight: bold; padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .correct { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .wrong { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

        .report-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 16px; margin-bottom: 12px; }
        .sol-detail { background: #ffffff; padding: 12px; border-radius: 10px; margin-top: 10px; display: none; font-family: monospace; border: 1px solid var(--action-cyan); white-space: pre-wrap; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <button id="global-back" class="btn-back hidden" onclick="goBack()">← VOLVER</button>
    <div class="logo-container">
        <h1 class="logo">Aprende Matemáticas<br><span style="color:var(--highlight-orange)">con el Profesor Mauricio</span></h1>
    </div>

    <div id="scr-welcome" class="screen active">
        <input type="text" id="user-name" placeholder="Tu nombre...">
        <button class="btn-main" onclick="goToMenu()">Ingresar a la Clase</button>
    </div>

    <div id="scr-main-menu" class="screen">
        <h3 style="text-align:center">¿Qué tema veremos hoy?</h3>
        <button class="btn-main" onclick="openTopic('ecuaciones')">1. Ecuaciones</button>
        <button class="btn-main" style="background:var(--action-cyan)" onclick="openTopic('valor-absoluto')">2. Valor Absoluto</button>
    </div>

    <div id="scr-topic-menu" class="screen">
        <h2 id="topic-title" style="text-align:center; color:var(--primary-blue)"></h2>
        <button class="btn-main" onclick="startMode('aprende')">Ver Explicación</button>
        <button class="btn-main" style="background:var(--action-cyan)" onclick="startMode('practica')">Practiquemos (Alternativas)</button>
        <button class="btn-main" style="background:var(--highlight-orange)" onclick="startMode('evalua')">Evaluación Final</button>
    </div>

    <div id="scr-practica" class="screen">
        <div class="story-box" id="practica-story"></div>
        <div id="practica-history" class="history-container"></div>
        <div id="practica-zone">
            <p style="text-align:center; font-weight:bold">Selecciona el paso correcto:</p>
            <div id="practica-options" style="display:grid; gap:10px"></div>
            <div id="practica-feedback" class="feedback hidden"></div>
        </div>
        <button id="btn-next-practica" class="btn-main hidden" onclick="nextPractica()">Siguiente Ejercicio →</button>
    </div>

    <div id="scr-evalua" class="screen">
        <h3 style="text-align:center">Test de Conocimientos</h3>
        <div id="evalua-container"></div>
        <button class="btn-main" style="background:var(--highlight-orange)" onclick="gradeEval()">Terminar Evaluación</button>
    </div>

    <div id="scr-report" class="screen">
        <h2 style="text-align:center">Resultados</h2>
        <div id="report-score" style="text-align:center; font-size: 3rem; font-weight:900; color:var(--primary-blue)"></div>
        <div id="report-details"></div>
        <button class="btn-main" onclick="sendWA()">Enviar al Prof. Mauricio</button>
    </div>
</div>

<script>
    let state = { name:"", topic:"", level:0, currentEx:null, step:0, quiz:[] };

    function getEx(topic, lvl) {
        const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        if(topic === 'ecuaciones') {
            let x = r(2, 10);
            return { s:`Calcula x en:`, expr:`x + ${lvl+2} = ${x+lvl+2}`, steps:[`x = ${x+lvl+2} - ${lvl+2}`, `x = ${x}`], res:x };
        } else {
            let x = r(5, 15);
            let b = r(1, 10);
            return { 
                s:`Ecuación con valor absoluto:`, 
                expr:`|x| + ${b} = ${x+b}`, 
                steps:[`|x| = ${x+b} - ${b}`, `|x| = ${x}`, `x = ${x} o x = -${x}`], 
                res: x, // Valor positivo de referencia
                isVA: true 
            };
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('global-back').classList.toggle('hidden', id === 'scr-welcome' || id === 'scr-report');
    }

    function goToMenu() { state.name = document.getElementById('user-name').value || "Estudiante"; showScreen('scr-main-menu'); }
    function openTopic(t) { state.topic = t; document.getElementById('topic-title').innerText = t === 'ecuaciones' ? "Ecuaciones" : "Valor Absoluto"; showScreen('scr-topic-menu'); }

    function startMode(m) {
        state.level = 0;
        if(m === 'practica') loadPractica();
        else if(m === 'evalua') renderEval();
    }

    function loadPractica() {
        state.currentEx = getEx(state.topic, state.level);
        state.step = 0;
        showScreen('scr-practica');
        document.getElementById('practica-history').innerHTML = `<div class="step-row current">${state.currentEx.expr}</div>`;
        document.getElementById('practica-story').innerText = state.currentEx.s;
        document.getElementById('btn-next-practica').classList.add('hidden');
        document.getElementById('practica-zone').classList.remove('hidden');
        document.getElementById('practica-feedback').classList.add('hidden');
        renderAlts();
    }

    function renderAlts() {
        const correct = state.currentEx.steps[state.step];
        const alts = [correct, `x = ${rInt()}`, `|x| = ${rInt()}`].sort(() => Math.random() - 0.5);
        const optCont = document.getElementById('practica-options');
        optCont.innerHTML = "";
        alts.forEach(a => {
            const b = document.createElement('button');
            b.className = "btn-alt"; b.innerText = a;
            b.onclick = () => {
                if(a === correct) {
                    document.getElementById('practica-history').lastChild.className = "step-row old";
                    const row = document.createElement('div'); row.className = "step-row current"; row.innerText = a;
                    document.getElementById('practica-history').appendChild(row);
                    state.step++;
                    if(state.step < state.currentEx.steps.length) renderAlts();
                    else {
                        document.getElementById('practica-zone').classList.add('hidden');
                        document.getElementById('btn-next-practica').classList.remove('hidden');
                    }
                } else {
                    const f = document.getElementById('practica-feedback');
                    f.innerText = "Revisa el procedimiento."; f.className="feedback wrong"; f.classList.remove('hidden');
                }
            };
            optCont.appendChild(b);
        });
    }

    function rInt() { return Math.floor(Math.random() * 20); }

    function renderEval() {
        showScreen('scr-evalua');
        const cont = document.getElementById('evalua-container');
        cont.innerHTML = ""; state.quiz = [];
        for(let i=0; i<3; i++) {
            let ex = getEx(state.topic, i); state.quiz.push(ex);
            cont.innerHTML += `<div class="report-card">Pregunta ${i+1}: ${ex.expr}<br><input type="number" id="ev-${i}" placeholder="Valor de x"></div>`;
        }
    }

    function gradeEval() {
        let nota = 0; const details = document.getElementById('report-details'); details.innerHTML = "";
        state.quiz.forEach((ex, i) => {
            let val = parseInt(document.getElementById(`ev-${i}`).value);
            // Lógica Corregida: Verifica ambos signos para Valor Absoluto
            let isCorrect = ex.isVA ? (Math.abs(val) === ex.res) : (val === ex.res);
            if(isCorrect) nota++;
            details.innerHTML += `
                <div class="report-card">
                    ${isCorrect?'✅':'❌'} Pregunta ${i+1}: ${ex.expr}<br>
                    Tu respuesta: x = ${val} | Correcta: x = ${ex.res} ${ex.isVA ? 'o x = -' + ex.res : ''}
                </div>`;
        });
        document.getElementById('report-score').innerText = `${nota} / ${state.quiz.length}`;
        showScreen('scr-report');
    }

    function nextPractica() { state.level++; if(state.level < 3) loadPractica(); else showScreen('scr-topic-menu'); }
    function goBack() { showScreen('scr-topic-menu'); }
    function sendWA() { window.open(`https://wa.me/56961410052?text=Reporte de ${state.name}`); }
</script>
</body>
</html>
