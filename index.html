<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende Matemáticas con el Profesor Mauricio</title>
    <style>
        :root {
            --primary-blue: #1e40af; 
            --action-cyan: #06b6d4;  
            --attention-yellow: #facc15; 
            --highlight-orange: #f97316; 
            --bg-light: #f8fafc;
            --text-dark: #0f172a;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-dark); }
        #app { background: var(--white); width: 95%; max-width: 650px; margin: 20px; border-radius: 24px; box-shadow: 0 20px 40px rgba(30, 64, 175, 0.1); padding: 25px; border-top: 8px solid var(--primary-blue); position: relative; }
        
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary-blue); margin: 0; line-height: 1.2; }

        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        /* ESTILO DE FRACCIÓN VERTICAL */
        .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; line-height: 1.1; margin: 0 5px; min-width: 30px; }
        .num { border-bottom: 2px solid currentColor; padding: 0 5px; width: 100%; text-align: center; }
        .den { padding: 0 5px; width: 100%; text-align: center; }

        .btn-main { background: var(--primary-blue); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; margin-bottom: 12px; transition: 0.2s; border-bottom: 4px solid #1e3a8a; }
        .btn-alt { background: var(--white); color: var(--text-dark); border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-alt:hover { border-color: var(--action-cyan); background: #ecfeff; }

        .history-container { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; padding: 15px; background: #f1f5f9; border-radius: 18px; border: 1px solid #e2e8f0; }
        .step-row { display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1.5rem; padding: 10px; font-weight: 600; min-height: 50px; }
        .step-row.current { background: var(--attention-yellow); border-radius: 12px; color: var(--primary-blue); }
        .step-row.old { opacity: 0.4; font-size: 1.1rem; }

        .highlight-box { background: var(--highlight-orange); color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 1rem; box-sizing: border-box; }
        
        .report-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 16px; margin-bottom: 12px; }
        .sol-detail { background: #ffffff; padding: 15px; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid var(--action-cyan); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="logo-container">
        <h1 class="logo">Aprende Matemáticas<br><span style="color:var(--highlight-orange)">con el Profesor Mauricio</span></h1>
    </div>

    <div id="scr-welcome" class="screen active">
        <input type="text" id="user-name" placeholder="Escribe tu nombre...">
        <button class="btn-main" onclick="goToMenu()">Empezar Clase</button>
    </div>

    <div id="scr-menu" class="screen">
        <h3 style="text-align:center">Ecuaciones de 1er Grado</h3>
        <button class="btn-main" onclick="startMode('aprende')">Ver Explicación Visual</button>
        <button class="btn-main" style="background:var(--action-cyan)" onclick="startMode('practica')">Practicar con Alternativas</button>
        <button class="btn-main" style="background:var(--highlight-orange)" onclick="startMode('evalua')">Realizar Evaluación</button>
    </div>

    <div id="scr-work" class="screen">
        <div id="work-story" style="background:#eff6ff; padding:15px; border-radius:12px; margin-bottom:15px"></div>
        <div id="work-history" class="history-container"></div>
        <div id="interactive-zone">
            <div id="alt-container" style="display:grid; gap:10px"></div>
            <p id="work-instr" style="text-align:center; font-weight:bold; color:var(--primary-blue)"></p>
        </div>
        <button id="btn-next" class="btn-main hidden" onclick="nextLevel()">Siguiente Ejercicio →</button>
    </div>

    <div id="scr-eval" class="screen">
        <h3 style="text-align:center">Test Final</h3>
        <div id="eval-list"></div>
        <button class="btn-main" style="background:var(--highlight-orange)" onclick="gradeEval()">Finalizar</button>
    </div>

    <div id="scr-report" class="screen">
        <h2 id="report-score" style="text-align:center; font-size: 3rem; color:var(--primary-blue)"></h2>
        <div id="report-feedback"></div>
        <button class="btn-main" onclick="location.reload()">Reiniciar App</button>
    </div>
</div>

<script>
    let state = { name:"", mode:"", level:0, currentEx:null, step:0, quiz:[] };

    function getEx(lvl) {
        const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        let x = r(2, 10);
        switch(lvl) {
            case 0: let a0 = r(5, 15); return { s:`Si a x le sumas ${a0}, obtienes ${x+a0}.`, html:`x + ${a0} = ${x+a0}`, res:x, steps:[`x = ${x+a0} - ${a0}`, `x = ${x}`] };
            case 1: let a1 = r(2, 6); return { s:`Calcula x en esta multiplicación:`, html:`${a1}x = ${a1*x}`, res:x, steps:[`x = <span class="frac"><span class="num">${a1*x}</span><span class="den">${a1}</span></span>`, `x = ${x}`] };
            case 2: let a2 = r(2, 8); return { s:`Calcula x en esta división:`, html:`<span class="frac"><span class="num">x</span><span class="den">${a2}</span></span> = ${x}`, res:x*a2, steps:[`x = ${x} · ${a2}`, `x = ${x*a2}`] };
            case 3: let a3 = r(2, 5), b3 = r(1, 10); return { s:`Ecuación de dos pasos:`, html:`${a3}x + ${b3} = ${a3*x+b3}`, res:x, steps:[`${a3}x = ${a3*x+b3} - ${b3}`, `${a3}x = ${a3*x}`, `x = <span class="frac"><span class="num">${a3*x}</span><span class="den">${a3}</span></span>`, `x = ${x}`] };
            case 4: let a4 = r(2, 4), b4 = r(1, 10); return { s:`División y suma combinadas:`, html:`<span class="frac"><span class="num">x</span><span class="den">${a4}</span></span> + ${b4} = ${x+b4}`, res:x*a4, steps:[`<span class="frac"><span class="num">x</span><span class="den">${a4}</span></span> = ${x+b4} - ${b4}`, `<span class="frac"><span class="num">x</span><span class="den">${a4}</span></span> = ${x}`, `x = ${x} · ${a4}`, `x = ${x*a4}`] };
        }
    }

    function goToMenu() { state.name = document.getElementById('user-name').value || "Estudiante"; showScreen('scr-menu'); }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function startMode(m) {
        state.mode = m; state.level = 0;
        if(m === 'evalua') renderEval();
        else loadExercise();
    }

    function loadExercise() {
        state.currentEx = getEx(state.level);
        state.step = 0;
        showScreen('scr-work');
        document.getElementById('work-story').innerHTML = `<b>Nivel ${state.level+1}:</b> ${state.currentEx.s}`;
        document.getElementById('work-history').innerHTML = `<div class="step-row current">${state.currentEx.html}</div>`;
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('interactive-zone').classList.remove('hidden');
        
        if(state.mode === 'aprende') {
            document.getElementById('work-instr').innerText = "Analiza el procedimiento...";
            setTimeout(showNextStepAprende, 1000);
        } else renderAlts();
    }

    function showNextStepAprende() {
        if(state.step < state.currentEx.steps.length) {
            addStepRow(state.currentEx.steps[state.step]);
            state.step++;
            setTimeout(showNextStepAprende, 1500);
        } else {
            document.getElementById('btn-next').classList.remove('hidden');
        }
    }

    function renderAlts() {
        document.getElementById('work-instr').innerText = "Selecciona el paso correcto:";
        const correct = state.currentEx.steps[state.step];
        const alts = [correct, `x = ${state.currentEx.res + 2}`, `x = ${Math.floor(Math.random()*20)}`].sort(() => Math.random() - 0.5);
        const cont = document.getElementById('alt-container');
        cont.innerHTML = "";
        alts.forEach(a => {
            const b = document.createElement('button');
            b.className = "btn-alt"; b.innerHTML = a;
            b.onclick = () => {
                if(a === correct) {
                    addStepRow(correct);
                    state.step++;
                    if(state.step < state.currentEx.steps.length) renderAlts();
                    else {
                        document.getElementById('interactive-zone').classList.add('hidden');
                        document.getElementById('btn-next').classList.remove('hidden');
                    }
                }
            };
            cont.appendChild(b);
        });
    }

    function addStepRow(html) {
        const hist = document.getElementById('work-history');
        hist.lastChild.className = "step-row old";
        const r = document.createElement('div');
        r.className = "step-row current"; r.innerHTML = html;
        hist.appendChild(r);
    }

    function nextLevel() { state.level++; if(state.level < 5) loadExercise(); else showScreen('scr-menu'); }

    function renderEval() {
        showScreen('scr-eval');
        const list = document.getElementById('eval-list');
        list.innerHTML = ""; state.quiz = [];
        for(let i=0; i<5; i++) {
            let ex = getEx(i); state.quiz.push(ex);
            list.innerHTML += `<div class="report-card"><b>${i+1}.</b> ${ex.html}<br><input type="number" id="q-${i}" placeholder="x = ?"></div>`;
        }
    }

    function gradeEval() {
        let nota = 0;
        const feed = document.getElementById('report-feedback');
        feed.innerHTML = "";
        state.quiz.forEach((ex, i) => {
            let val = parseInt(document.getElementById(`q-${i}`).value);
            let ok = val === ex.res;
            if(ok) nota++;
            feed.innerHTML += `
                <div class="report-card" style="border-left: 5px solid ${ok?'#22c55e':'#ef4444'}">
                    <b>Reto ${i+1}:</b> ${ex.html} ${ok?'✅':'❌'}<br>
                    Tu respuesta: ${val || '?'} | Correcta: ${ex.res}
                    <button class="btn-alt" style="width:100%; margin-top:10px; padding:5px" onclick="document.getElementById('s-${i}').style.display='block'">Ver Solución</button>
                    <div id="s-${i}" class="sol-detail">
                        ${ex.steps.map(s => `<div class="step-row" style="font-size:1rem">${s}</div>`).join('')}
                    </div>
                </div>`;
        });
        document.getElementById('report-score').innerText = `${nota} / 5`;
        showScreen('scr-report');
    }
</script>
</body>
</html>
